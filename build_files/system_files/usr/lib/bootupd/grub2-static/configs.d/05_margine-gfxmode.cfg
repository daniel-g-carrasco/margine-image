# Margine: make the GRUB boot menu legible on HiDPI panels.
#
# bootc's static GRUB config (this directory) sets no gfxmode and no font, so
# the menu renders at the panel's NATIVE resolution with GRUB's built-in ~16px
# font. On a HiDPI panel (e.g. 2880x1920, ~257 DPI) that glyph is ~1.6mm tall —
# microscopic. Cap the render mode at 1080p (HiDPI panels upscale it to a
# readable ~2.8mm) with safe fallbacks, and only switch to gfxterm AFTER a font
# has actually loaded, so a font/video failure can never leave the menu blank.
#
# Generalises across hardware with no DPI probing (GRUB has none; upstream
# dropped the fragile per-boot scaling for exactly that reason):
#   - a native-1080p laptop renders 1:1 (no change in feel);
#   - a low-res / older panel falls through to a supported mode or its native
#     mode, where the 16px font is already large enough (low-res == low-DPI);
#   - a 4K / HiDPI panel renders at 1080p and the panel upscales -> readable.
# Static, universally-safe values; reversible via an atomic rollback.
if loadfont unicode ; then
  set gfxmode=1920x1080,1280x1024,auto
  set gfxpayload=keep
  terminal_output gfxterm
fi
