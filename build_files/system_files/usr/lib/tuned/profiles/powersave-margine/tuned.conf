# Margine powersave profile — inherits the stock Fedora tuned powersave
# profile, then runs script.sh to flip the active scx scheduler mode
# IF scx_loader.service is active. If it is not (default), script.sh
# is a no-op. Audit §6.7 + recommendation #21.
[main]
include=powersave
summary=Optimize powersave, flip scx scheduler mode via scxctl when scx is opt-in

[script]
script=script.sh
