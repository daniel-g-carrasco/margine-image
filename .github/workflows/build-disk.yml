---
# Margine ISO + qcow2 builder.
#
# Pipeline shape (2026-06-02 split, see
# ~/.claude/.../memory/feedback_ci_split_long_jobs.md for the rule):
#
#   build_disk (matrix: anaconda-iso, qcow2)  ──┐
#                                               │  uploads each artifact
#                                               │  as GHA workflow artifact
#                                               ▼
#                              publish_ia (ISO only)  ──┐
#                                                       ▼
#                                                      notify (if: always())
#
# build_disk does the heavy work — bootc-image-builder (~15-17 min) +
# checksums + upload-artifact. publish_ia downloads the ISO artifact
# and pushes it to Internet Archive (the unstable, slow, multi-GB step
# that for the previous monolithic shape forced a full BIB rerun
# whenever the upload failed). On a failed publish_ia,
# `gh run rerun --failed <run-id>` re-runs only the upload step in
# minutes instead of redoing the whole 15-17 min BIB pipeline.
#
# The qcow2 matrix entry doesn't publish anywhere today — its artifact
# is just retained as a GHA workflow artifact for daniel to grab
# manually when testing in QEMU/virt-manager. publish_ia downloads
# only the anaconda-iso artifact.
#
# Runs on GitHub-hosted ubuntu-24.04. The self-hosted PVE builder
# VM (margine-builder, VM 170) was decommissioned on 2026-06-01
# after two freezes — the second one took the entire PVE host down
# with ZFS spacemap corruption (see proxmox-pve1/docs/operations/
# zfs-spacemap-corruption-recovery.md).
#
# Cadence: manual trigger only (workflow_dispatch). ISOs are heavy
# (~5 GB each), so we generate one only when there's an actual
# reason — typically after a notable upstream change or a Margine
# release event, not on every push.

name: Build disk images

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - './disk_config/disk.toml'
      - './disk_config/iso-gnome.toml'
      - './.github/workflows/build-disk.yml'

env:
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "stable"
  BIB_IMAGE: "quay.io/centos-bootc/bootc-image-builder:latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build_disk:
    name: Build disk (${{ matrix.image }} / ${{ matrix.disk-type }})
    runs-on: ubuntu-24.04
    # BIB is ~15-17 min, sha256 + artifact upload ~1-3 min. 45 is a
    # comfortable cap for the build half of the pipeline.
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        # Both flavours: base Margine and the gaming variant. Both
        # get qcow2 (smoke testing in QEMU/virt-manager) + anaconda-iso
        # (real-hardware install). 4 jobs total run in parallel.
        image: ["margine", "margine-gaming"]
        disk-type: ["qcow2", "anaconda-iso"]
    permissions:
      contents: read
      # packages: write (NOT just read) — required for installer-image
      # push step. The GHCR `margine-installer` + `margine-gaming-
      # installer` packages have been bootstrap-pushed once manually
      # (2026-06-05 by daniel) so CI doesn't need create-package
      # scope, but it does need write to push new run-* tags on top.
      packages: write
      id-token: write
    outputs:
      # These are matrix outputs — to consume them from a non-matrix
      # downstream job (publish_ia), reference the artifact name pattern
      # directly instead. We expose disk-type just for clarity in the
      # ntfy step.
      iso_artifact: ${{ steps.upload.outputs.artifact-id }}

    steps:
      - name: Maximize build space
        # ubuntu-24.04 has ~14 GiB free by default; bootc-image-builder
        # needs ~30 GiB scratch for qcow2/ISO build + buildah cache.
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9
        with:
          remove-codeql: true

      - name: Prepare environment
        run: |
          USER_UID=$(id -u)
          USER_GID=$(id -g)
          DISK_TYPE=$(echo "${{ matrix.disk-type }}" | tr ' ' '-')
          # IMAGE_NAME comes from the matrix (margine or margine-gaming).
          IMAGE_NAME="${{ matrix.image }}"
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}
          echo "DISK_TYPE=${DISK_TYPE}" >> ${GITHUB_ENV}
          echo "USER_UID=${USER_UID}" >> ${GITHUB_ENV}
          echo "USER_GID=${USER_GID}" >> ${GITHUB_ENV}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Pre-build login to GHCR (for base-image pull)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | timeout 30 podman login ghcr.io \
            -u "${{ github.actor }}" --password-stdin

      - name: Pre-pull bootc-image-builder (resilient to quay.io 5xx)
        # quay.io occasionally returns 5xx for minutes at a time
        # (observed 2026-06-01: a Cloudflare/quay outage that the
        # downstream action surfaced only as a single failed pull).
        # Retry explicitly with exponential backoff so the image is
        # in the local store by the time the action runs; the action
        # then finds it cached and proceeds.
        run: |
          set -uo pipefail
          for attempt in 1 2 3 4 5 6 7 8; do
            if sudo podman pull "${{ env.BIB_IMAGE }}"; then
              echo "bootc-image-builder pulled on attempt $attempt"
              exit 0
            fi
            backoff=$((attempt * 30))
            echo "pull attempt $attempt failed; sleeping ${backoff}s before retry"
            sleep $backoff
          done
          echo "::error::Unable to pull ${{ env.BIB_IMAGE }} after 8 attempts; quay.io may be down"
          exit 1

      # === installer-image pattern (Bazzite) for anaconda-iso only ===
      # Build a transient `<flavor>-installer` image that's the base
      # bootc image + Flatpaks pre-baked into /var/lib/flatpak. BIB
      # anaconda-iso uses THIS image instead of the base — the
      # installer rootfs ships with all Flatpaks already in
      # /var/lib/flatpak, and the kickstart in iso-gnome.toml just
      # rsyncs them to the target's /var/lib/flatpak. No flatpak
      # install at install time → no /tmp OOM in installer env →
      # no silent failure → user actually gets the apps at first
      # login. qcow2 path keeps using the base image (qcow2 is for
      # QEMU smoke test, no need to inflate it with Flatpaks).
      - name: Login to GHCR for installer push
        if: matrix.disk-type == 'anaconda-iso'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io \
            -u "${{ github.actor }}" --password-stdin

      - name: Pull base image (for installer FROM)
        if: matrix.disk-type == 'anaconda-iso'
        run: |
          sudo podman pull "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}"

      - name: Build installer image (BAKE Flatpaks)
        if: matrix.disk-type == 'anaconda-iso'
        id: installer
        run: |
          set -euo pipefail
          # Select flatpaks list by flavor.
          if [[ "${{ matrix.image }}" == "margine-gaming" ]]; then
            FLATPAK_LIST_FILE=flatpaks-gaming
          else
            FLATPAK_LIST_FILE=flatpaks-base
          fi
          BASE_IMAGE="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}"
          INSTALLER_TAG="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}-installer:run-${{ github.run_id }}"
          echo "Building $INSTALLER_TAG from $BASE_IMAGE with $FLATPAK_LIST_FILE"
          # --cap-add sys_admin --security-opt label=disable: flatpak
          # install in the installer Containerfile uses bwrap which
          # needs user namespaces. Without these flags bwrap fails
          # with "Creating new namespace failed: Operation not
          # permitted" and Reaper/Steam/openh264 apply_extra dies.
          # Bazzite's installer/Containerfile documents the same
          # requirement: "# run with --cap-add sys_admin
          # --security-opt label=disable".
          sudo podman build \
            --cap-add sys_admin \
            --security-opt label=disable \
            --build-arg "BASE_IMAGE=$BASE_IMAGE" \
            --build-arg "FLATPAK_LIST_FILE=$FLATPAK_LIST_FILE" \
            -t "$INSTALLER_TAG" \
            -f installer/Containerfile \
            installer/
          sudo podman push "$INSTALLER_TAG"
          echo "installer_tag=$INSTALLER_TAG" >> "$GITHUB_OUTPUT"

      - name: Build disk image
        id: build
        uses: osbuild/bootc-image-builder-action@main
        with:
          builder-image: ${{ env.BIB_IMAGE }}
          config-file: ${{ matrix.disk-type == 'anaconda-iso' && './disk_config/iso-gnome.toml' || './disk_config/disk.toml' }}
          image: ${{ matrix.disk-type == 'anaconda-iso' && steps.installer.outputs.installer_tag || format('{0}/{1}:{2}', env.IMAGE_REGISTRY, env.IMAGE_NAME, env.DEFAULT_TAG) }}
          chown: ${{ env.USER_UID }}:${{ env.USER_GID }}
          types: ${{ matrix.disk-type }}
          # Margine's :stable inherits from Bluefin DX, which doesn't
          # set the `containers.bootc.rootfs` OCI label; without an
          # explicit rootfs here bootc-image-builder errors out with
          # "DefaultRootFs missing". Bluefin's own ISO uses btrfs and
          # so does Margine's Anaconda installer config (Btrfs default
          # in Anaconda).
          rootfs: btrfs
          additional-args: --use-librepo=True

      - name: List + sha256 outputs
        # Step id was `outputs` previously — that collides with GHA's
        # reserved `outputs` expression context, and `${{ steps.outputs.outdir }}`
        # evaluated to empty downstream (see run #26782508735, ia upload step
        # received OUTDIR=""). Renamed to `disk` to avoid the shadow.
        id: disk
        run: |
          set -euo pipefail
          OUTDIR="${{ steps.build.outputs.output-directory }}"
          if [[ -z "$OUTDIR" || ! -d "$OUTDIR" ]]; then
            echo "::error::bootc-image-builder did not produce an output directory ($OUTDIR)"
            exit 1
          fi
          echo "outdir=$OUTDIR" >> "$GITHUB_OUTPUT"
          ls -la "$OUTDIR"
          # bootc-image-builder puts artifacts under subdirs
          # (bootiso/install.iso, qcow2/disk.qcow2). Walk recursively
          # for sha256 and capture artifact paths so downstream steps
          # have the actual file location, not a glob.
          #
          # CRITICAL: write SHA256SUMS with paths RELATIVE TO $OUTDIR
          # (e.g. "bootiso/install.iso", not "./output/bootiso/install.iso").
          # Run #26789024483's publish_ia failed verification because the
          # download-artifact unpacks the dir at ./disk, not ./output —
          # absolute or build-side-relative paths in SHA256SUMS become
          # unreadable downstream. Relative paths verify correctly from
          # any CWD that contains the same internal directory layout.
          ARTIFACT_REL=""
          (cd "$OUTDIR" && find . -type f \( -name '*.iso' -o -name '*.qcow2' \) -print | sort) > /tmp/disk-files.txt
          ( cd "$OUTDIR" && while read -r rel; do
              rel="${rel#./}"
              sha256sum "$rel"
            done < /tmp/disk-files.txt
          ) > "$OUTDIR/SHA256SUMS"
          cat "$OUTDIR/SHA256SUMS"
          ARTIFACT_REL="$(head -1 /tmp/disk-files.txt | sed 's|^\./||')"
          if [[ -z "$ARTIFACT_REL" ]]; then
            echo "::error::no .iso or .qcow2 produced under $OUTDIR"
            exit 1
          fi
          ARTIFACT="$OUTDIR/$ARTIFACT_REL"
          SIZE_BYTES="$(stat -c %s "$ARTIFACT")"
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"
          echo "artifact_basename=$(basename "$ARTIFACT")" >> "$GITHUB_OUTPUT"
          echo "size_bytes=$SIZE_BYTES" >> "$GITHUB_OUTPUT"
          echo "Artifact: $ARTIFACT ($((SIZE_BYTES / 1024 / 1024)) MB / $SIZE_BYTES bytes)"

      - name: Upload disk artifact + SHA256SUMS
        # Pass the disk image to publish_ia via GHA workflow artifacts.
        # ~3-5 GB transfer takes ~30-90 sec each direction on GHA's
        # internal CAS — the net cost vs the old monolithic shape is
        # ~2-3 min, vs ~15-17 min saved on every IA-upload failure.
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.image }}-disk-${{ matrix.disk-type }}
          # Pack the *whole* output dir (artifact + SHA256SUMS); the
          # publish_ia step needs both.
          path: ${{ steps.disk.outputs.outdir }}
          # ISOs are timestamped daily; one day of retention is plenty
          # for the publish_ia handoff. Bump to 7 if you want to retry
          # publish manually a few days later.
          retention-days: 1
          if-no-files-found: error
          compression-level: 0  # ISOs/qcow2s are not further compressible

  publish_ia:
    name: Publish ISO (${{ matrix.image }}) to Internet Archive
    needs: build_disk
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    # 180 = IA upload (often 60-90 min for multi-GB ISO) + derive wait
    # (up to 25 min) + slack. The fact that we can re-run just this
    # job on flakiness is the whole point of the split.
    timeout-minutes: 180
    strategy:
      # Run base + gaming uploads in parallel — they're independent,
      # and a failure of one doesn't invalidate the other.
      fail-fast: false
      matrix:
        image: ["margine", "margine-gaming"]
    permissions:
      contents: read
    outputs:
      identifier: ${{ steps.ia_upload.outputs.identifier }}
    steps:
      - name: Download ISO artifact (${{ matrix.image }})
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ matrix.image }}-disk-anaconda-iso
          path: ./disk

      - name: Locate ISO + verify integrity
        id: disk
        run: |
          set -euo pipefail
          OUTDIR="$(pwd)/disk"
          ARTIFACT="$(find "$OUTDIR" -type f -name '*.iso' | head -1)"
          if [[ -z "$ARTIFACT" || ! -f "$ARTIFACT" ]]; then
            echo "::error::no .iso found in downloaded artifact at $OUTDIR"
            ls -la "$OUTDIR" || true
            exit 1
          fi
          SIZE_BYTES="$(stat -c %s "$ARTIFACT")"
          BASE="$(basename "$ARTIFACT")"
          echo "outdir=$OUTDIR" >> "$GITHUB_OUTPUT"
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"
          echo "artifact_basename=$BASE" >> "$GITHUB_OUTPUT"
          echo "Will upload $BASE — $((SIZE_BYTES / 1024 / 1024)) MB ($SIZE_BYTES bytes)"
          # Re-verify checksum locally — catches any artifact-transit
          # corruption before we burn an hour pushing it to IA. We chdir
          # to the dir that contains the file (bootiso/) so paths in
          # SHA256SUMS ("bootiso/install.iso") resolve correctly here,
          # where the OUTDIR root sits one level above.
          (cd "$OUTDIR" && sha256sum -c SHA256SUMS)

          # Regenerate SHA256SUMS for the PUBLISHED layout. Internet
          # Archive serves the uploaded file at the item root
          # (archive.org/download/<id>/install.iso, not
          # /bootiso/install.iso), so the SHA256SUMS we ship next to
          # it must reference the basename only. End-users who do
          # `sha256sum -c SHA256SUMS` after downloading both files from
          # IA expect them to be siblings — the build-side
          # bootiso/install.iso layout makes that check fail.
          # cd into the artifact's dir so sha256sum prints just the
          # basename (its argument), then write the result back to
          # OUTDIR/SHA256SUMS (overwriting the build-side version).
          ( cd "$(dirname "$ARTIFACT")" && sha256sum "$BASE" ) > "$OUTDIR/SHA256SUMS"
          echo "SHA256SUMS rewritten for IA layout:"
          cat "$OUTDIR/SHA256SUMS"

      - name: Install Internet Archive CLI (ia)
        run: |
          set -euo pipefail
          if ! command -v ia >/dev/null; then
            python3 -m pip install --user --quiet internetarchive
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi
          ~/.local/bin/ia --version || ia --version

      - name: Upload to Internet Archive (torrent-first distribution)
        # IA auto-generates a BitTorrent .torrent + magnet + 3 HTTP
        # mirrors for everything we upload, and seeds it forever. This
        # is the same pattern Bluefin/Bazzite use to avoid Cloudflare
        # TOS (no large binary content served from origin) and to keep
        # our home-server upload bandwidth free.
        #
        # ia 5.x CLI surface (verified against the installed pip
        # internetarchive==5.9.0, run #26789968571):
        #   - `--verbose` does NOT exist as an `ia upload` subcommand
        #     flag (run #26787945599 failed: "unrecognized arguments:
        #     --verbose").
        #   - `-l` is a *flag* (no value) at the top level that means
        #     "also write logs to a file". Passing `-l info` (run
        #     #26789968571) makes argparse interpret 'info' as the
        #     positional command and reject:
        #     "invalid choice: 'info' (choose from 'upload', …)".
        #   - `-d` / `--debug` at the top level enables verbose stderr
        #     logging — that's the actual knob for "show progress".
        # --retries 5 (default 3): IA's S3 endpoint returns 503 under
        #            load; 3 retries isn't always enough for a multi-GB
        #            multi-part upload.
        # --sleep 60 (default 30): be a better neighbour to IA during
        #            backoff.
        env:
          IA_S3_ACCESS: ${{ secrets.IA_ACCESS_KEY }}
          IA_S3_SECRET: ${{ secrets.IA_SECRET_KEY }}
        run: |
          set -euo pipefail
          OUTDIR="${{ steps.disk.outputs.outdir }}"
          ARTIFACT="${{ steps.disk.outputs.artifact }}"
          DATE_TAG="$(date -u +%Y%m%d)"
          # Per-variant IA identifier + human-readable title. The base
          # keeps the historical "margine-anaconda-iso-YYYYMMDD"
          # identifier; the gaming variant gets its own item.
          IDENTIFIER="${{ matrix.image }}-anaconda-iso-${DATE_TAG}"
          if [[ "${{ matrix.image }}" == "margine-gaming" ]]; then
            TITLE="Margine Gaming Linux ISO ${DATE_TAG}"
            DESCRIPTION="Margine Gaming — Margine base + gamescope/mangohud/vkBasalt/gamemode/etc. + Steam/Lutris/Heroic/Bottles/Protontricks/ProtonUp-Qt/RetroArch preinstalled. Built on ${DATE_TAG} from commit ${{ github.sha }}. Source: https://github.com/${{ github.repository }}"
            SUBJECT="linux;fedora;bootc;bluefin;cachyos;margine;gaming;steam"
          else
            TITLE="Margine Linux ISO ${DATE_TAG}"
            DESCRIPTION="Margine — Bluefin DX + CachyOS signed kernel + Margine deltas. Built on ${DATE_TAG} from commit ${{ github.sha }}. Source: https://github.com/${{ github.repository }}"
            SUBJECT="linux;fedora;bootc;bluefin;cachyos;margine"
          fi
          export IA_CONFIG_FILE=/tmp/ia.ini
          cat > "$IA_CONFIG_FILE" <<EOF
          [s3]
          access = ${IA_S3_ACCESS}
          secret = ${IA_S3_SECRET}
          EOF
          chmod 0600 "$IA_CONFIG_FILE"
          ia --config-file "$IA_CONFIG_FILE" --debug upload "$IDENTIFIER" \
            "$ARTIFACT" "$OUTDIR/SHA256SUMS" \
            --retries 5 \
            --sleep 60 \
            --metadata="mediatype:software" \
            --metadata="collection:opensource" \
            --metadata="title:${TITLE}" \
            --metadata="description:${DESCRIPTION}" \
            --metadata="subject:${SUBJECT}" \
            --metadata="creator:daniel-g-carrasco" \
            --metadata="licenseurl:https://www.apache.org/licenses/LICENSE-2.0"
          echo "identifier=$IDENTIFIER" >> "$GITHUB_OUTPUT"
          echo "Uploaded as https://archive.org/details/$IDENTIFIER"
        id: ia_upload

      - name: Wait for IA to derive (gen torrent + mirrors)
        timeout-minutes: 25
        env:
          IDENTIFIER: ${{ steps.ia_upload.outputs.identifier }}
        run: |
          set -euo pipefail
          # IA needs a few minutes to derive a .torrent + magnet for
          # the upload. Poll until the *_archive.torrent file shows up.
          for i in $(seq 1 60); do
            sleep 20
            if ia --config-file /tmp/ia.ini list "$IDENTIFIER" 2>/dev/null | grep -q '_archive\.torrent$'; then
              echo "Torrent ready after ~$((i*20))s"
              ia --config-file /tmp/ia.ini list "$IDENTIFIER"
              exit 0
            fi
            echo "  (poll $i) torrent not yet derived, retrying…"
          done
          echo "::warning::IA torrent not derived within 20 min — index will use HTTP mirrors only"

      - name: Generate index.html for the IA upload page
        env:
          IDENTIFIER: ${{ steps.ia_upload.outputs.identifier }}
        run: |
          set -euo pipefail
          OUTDIR="${{ steps.disk.outputs.outdir }}"
          DATE_TAG="$(date -u +%Y%m%d)"
          ISO_NAME="${{ steps.disk.outputs.artifact_basename }}"
          if [[ "${{ matrix.image }}" == "margine-gaming" ]]; then
            HEADER="Margine Gaming ${DATE_TAG}"
            SUBHEAD="Margine Gaming — Margine + Steam/Lutris/Heroic/Bottles + gamescope/mangohud/vkBasalt/gamemode preinstalled."
          else
            HEADER="Margine ${DATE_TAG}"
            SUBHEAD="Margine — Bluefin DX + CachyOS signed kernel."
          fi
          TORRENT_URL="https://archive.org/download/${IDENTIFIER}/${IDENTIFIER}_archive.torrent"
          MIRROR_HTTP="https://archive.org/download/${IDENTIFIER}/${ISO_NAME}"
          cat > "$OUTDIR/index.html" <<HTML
          <!doctype html>
          <html lang="en"><head>
            <meta charset="utf-8">
            <title>${HEADER} — downloads</title>
            <style>
              body { font: 15px/1.5 ui-sans-serif, system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; color: #1a1a1a; }
              h1 { font-size: 22px; }
              code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
              .pkg { background: #fafafa; border: 1px solid #ddd; border-radius: 8px; padding: 16px 20px; margin-top: 12px; }
              a { color: #1e5fb6; }
              footer { margin-top: 32px; color: #888; font-size: 13px; }
            </style>
          </head><body>
            <h1>${HEADER}</h1>
            <p>${SUBHEAD}
               Build dal commit <code>${{ github.sha }}</code>.</p>

            <div class="pkg">
              <strong>Anaconda installer ISO</strong> · <code>${ISO_NAME}</code><br>
              <p>
                ⤓ <a href="${TORRENT_URL}">Download .torrent</a> (consigliato)<br>
                ⤓ <a href="${MIRROR_HTTP}">Download HTTP diretto</a> (IA mirror)<br>
                🗂 <a href="https://archive.org/details/${IDENTIFIER}">Pagina Internet Archive</a> (tutti i mirror)
              </p>
            </div>

            <p>Hash di verifica: <a href="SHA256SUMS">SHA256SUMS</a></p>

            <footer>
              Pubblicato il $(date -u +%Y-%m-%dT%H:%MZ).
              ISO ospitate da <a href="https://archive.org">Internet Archive</a>;
              questo sito serve solo magnet/HTML.
              Sorgente: <a href="https://github.com/${{ github.repository }}">${{ github.repository }}</a>.
            </footer>
          </body></html>
          HTML

      - name: Upload index.html + SHA256SUMS as workflow artifact
        # The big binary lives authoritatively on Internet Archive
        # (uploaded above). The lightweight pieces — HTML index page
        # with magnet links and the SHA256SUMS file — are kept here
        # as a downloadable GHA artifact. Anyone who wants to publish
        # them under a friendly URL can grab the artifact and rsync it
        # to a webserver of their choice.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.image }}-iso-index-${{ steps.ia_upload.outputs.identifier }}
          path: |
            ${{ steps.disk.outputs.outdir }}/index.html
            ${{ steps.disk.outputs.outdir }}/SHA256SUMS
          retention-days: 30

  bump_site:
    # After publish_ia succeeds for BOTH flavours (margine + margine-gaming),
    # auto-open a PR on margine-os-1084ca72 that bumps the LATEST_ISO_DATE
    # constant in src/routes/index.tsx. That single constant drives 8
    # hardcoded direct-link URLs on the site (4 per flavour:
    # IA details / .torrent / direct HTTP / SHA256SUMS). Without this,
    # the site's Hero CTAs and Install Option A direct links would have
    # to be bumped by hand after every release.
    #
    # SETUP REQUIREMENT — repo secret `SITE_BUMP_TOKEN`:
    #   A fine-grained GitHub PAT scoped to repo
    #   daniel-g-carrasco/margine-os-1084ca72, with permissions:
    #     Contents:       Read and write
    #     Pull requests:  Read and write
    #   Stored as Actions secret SITE_BUMP_TOKEN in this repo
    #   (margine-image). Without it the job no-ops with a clear message
    #   instead of failing the workflow.
    name: Auto-bump LATEST_ISO_DATE on margine.the-empty.place repo
    needs: publish_ia
    # Only runs when both publish_ia matrix children succeeded
    # (matrix needs uses the strictest of the children — success means
    # both base + gaming uploaded). PR events skip this step entirely.
    if: success() && github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check SITE_BUMP_TOKEN availability
        id: secret_check
        env:
          T: ${{ secrets.SITE_BUMP_TOKEN }}
        run: |
          if [[ -z "${T:-}" ]]; then
            echo "::warning::SITE_BUMP_TOKEN secret not set; skipping auto-bump."
            echo "::warning::Create a fine-grained PAT scoped to margine-os-1084ca72 (Contents+PR write) and save as SITE_BUMP_TOKEN to enable."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout site repo
        if: steps.secret_check.outputs.skip != 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          repository: daniel-g-carrasco/margine-os-1084ca72
          token: ${{ secrets.SITE_BUMP_TOKEN }}
          path: site
          fetch-depth: 1

      - name: Bump LATEST_ISO_DATE + open PR
        if: steps.secret_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.SITE_BUMP_TOKEN }}
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          set -euo pipefail
          cd site

          NEW_DATE="$(date -u +%Y%m%d)"
          # Match the line shape exactly: `const LATEST_ISO_DATE = "YYYYMMDD";`
          OLD_DATE="$(grep -oE 'LATEST_ISO_DATE = "[0-9]+"' src/routes/index.tsx \
            | head -1 | grep -oE '[0-9]+' || true)"

          if [[ -z "$OLD_DATE" ]]; then
            echo "::error::Could not find LATEST_ISO_DATE in src/routes/index.tsx"
            exit 1
          fi
          if [[ "$OLD_DATE" == "$NEW_DATE" ]]; then
            echo "LATEST_ISO_DATE already at $NEW_DATE — no bump needed."
            exit 0
          fi
          echo "Bumping LATEST_ISO_DATE: $OLD_DATE → $NEW_DATE"

          sed -i "s|LATEST_ISO_DATE = \"$OLD_DATE\"|LATEST_ISO_DATE = \"$NEW_DATE\"|" \
            src/routes/index.tsx

          # If a PR for the same target date already exists on the head
          # branch (re-dispatch on same UTC day), skip — don't churn.
          BRANCH="chore/bump-iso-date-$NEW_DATE"
          if gh pr list --repo daniel-g-carrasco/margine-os-1084ca72 \
               --head "$BRANCH" --state open --json number --jq '.[0].number' \
             | grep -q '^[0-9]'; then
            echo "PR for branch $BRANCH already exists — leaving in place."
            exit 0
          fi

          git config user.email "noreply@margine.the-empty.place"
          git config user.name "margine-bump-bot"
          git checkout -b "$BRANCH"
          git add src/routes/index.tsx

          # Heredoc keeps the YAML scanner happy (no unindented lines
          # inside the run: block) and bash handles the multiline message.
          COMMIT_MSG=$(cat <<EOF
          chore(release): bump LATEST_ISO_DATE to ${NEW_DATE}

          Auto-bump triggered by margine-image build-disk.yml after a
          successful IA publish for both flavours.

          Previous: ${OLD_DATE}
          New:      ${NEW_DATE}
          EOF
          )
          git commit -m "$COMMIT_MSG"
          git push -u origin "$BRANCH"

          PR_BODY=$(cat <<EOF
          Auto-opened by [margine-image build-disk #${{ github.run_id }}](${RUN_URL}).

          The site's hardcoded direct-link URLs (4 base + 4 gaming) point at
          \`archive.org/details/margine{,-gaming}-anaconda-iso-\$LATEST_ISO_DATE\`.
          This PR bumps the date constant after a successful Internet Archive
          publish so the Hero CTAs and Install Option A reference the just-
          released ISOs.

          Previous: \`${OLD_DATE}\`
          New:      \`${NEW_DATE}\`

          If everything looks right, squash-merge. The webhook deploy on
          VM 110 picks up the change in ~2-3 min.
          EOF
          )
          gh pr create \
            --repo daniel-g-carrasco/margine-os-1084ca72 \
            --base main \
            --head "$BRANCH" \
            --title "chore(release): bump LATEST_ISO_DATE to ${NEW_DATE}" \
            --body "$PR_BODY"

  notify:
    name: ntfy notification (aggregated)
    needs: [build_disk, publish_ia]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Notify ntfy
        env:
          NTFY_URL: ${{ secrets.NTFY_TOPIC_URL }}
          BUILD_RESULT: ${{ needs.build_disk.result }}
          PUBLISH_RESULT: ${{ needs.publish_ia.result }}
        run: |
          if [[ -z "${NTFY_URL:-}" ]]; then
            echo "NTFY_TOPIC_URL secret not set, skipping notification."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Decision matrix — the partial-success case (BIB OK, IA failed)
          # is the interesting one: it tells daniel exactly how to retry
          # without redoing the whole BIB pipeline.
          if [[ "$BUILD_RESULT" == "success" && "$PUBLISH_RESULT" == "success" ]]; then
            TITLE="Disk images built + ISO on Internet Archive"
            PRIO="default"
            TAGS="cd,white_check_mark"
            MSG="Run #${{ github.run_number }} done. Both qcow2 and ISO built; ISO + magnet on archive.org/details/."
          elif [[ "$BUILD_RESULT" == "failure" ]]; then
            TITLE="Disk build FAILED (BIB)"
            PRIO="high"
            TAGS="x,cd"
            MSG="bootc-image-builder failed. See logs: ${RUN_URL}"
          elif [[ "$PUBLISH_RESULT" == "failure" ]]; then
            TITLE="ISO built but IA upload FAILED — retry only the publish job"
            PRIO="high"
            TAGS="cd,closed_lock_with_key"
            MSG="The ISO + qcow2 are built and saved as GHA artifacts. Retry just the publish_ia job: gh run rerun --failed ${{ github.run_id }}"
          elif [[ "$BUILD_RESULT" == "cancelled" || "$PUBLISH_RESULT" == "cancelled" ]]; then
            TITLE="Disk pipeline cancelled"
            PRIO="low"
            TAGS="warning"
            MSG=""
          else
            TITLE="Disk pipeline status: build=${BUILD_RESULT}, publish=${PUBLISH_RESULT}"
            PRIO="default"
            TAGS="warning"
            MSG=""
          fi
          curl --silent --show-error --fail \
            -H "Title: ${TITLE}" \
            -H "Priority: ${PRIO}" \
            -H "Tags: ${TAGS}" \
            -H "Click: ${RUN_URL}" \
            -d "${MSG}" \
            "$NTFY_URL" || echo "ntfy notify failed (non-fatal)"
