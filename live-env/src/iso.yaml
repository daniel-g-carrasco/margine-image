# Titanoboa ISO config for the Margine Live ISO (ADR-0008).
# Consumed by ublue-os/titanoboa build_iso.sh, which reads `label` for
# the ISO 9660 volume id + filename and `grub2.entries` to generate
# grub.cfg. Reference: live-env/references/bazzite/iso.yaml.
#
# CRITICAL: the kernel command line MUST carry `rd.live.image` and
# `root=live:CDLABEL=<label>` — without them dmsquash-live cannot locate
# /LiveOS/squashfs.img and the live boot panics. CDLABEL must match the
# `label` field below exactly (Margine-Live).
#
# initrd path is `/images/pxeboot/initrd.img` (NOT initramfs.img):
# Titanoboa's build_iso.sh copies /usr/lib/modules/*/initramfs.img TO
# /images/pxeboot/initrd.img (it renames). Verified against
# build_iso.sh @5c457c3. vmlinuz keeps its name.
#
# enforcing=0 runs the LIVE session SELinux-permissive (installer
# convenience only — the INSTALLED system is fully enforcing; the
# install kickstart relabels the target).
#
# Serial console (console=ttyS0) is deliberately NOT baked into the
# shipped entries. The earlier assumption that "a machine with no serial
# port simply ignores ttyS0" turned out false: a board that advertises a
# phantom 8250 UART (common on mini-PCs, e.g. the Beelink SER8 / Ryzen
# 8745) makes every kernel printk busy-wait on a TX that never completes,
# which on a show_status boot drags the whole boot ~30x slower and then
# wedges (forum thread 12247, 2026-06-25). So the public ISO uses only
# console=tty0. The CI ISO boot-test still gets full serial observability:
# it boots the ISO's extracted kernel+initrd via -kernel/-initrd/-append
# and injects console=ttyS0 + systemd.show_status=1 THERE (build-disk.yml
# -> qemu-boot-wait.sh), so the serial console exists only in CI, never on
# user hardware. The installed system's observability is unaffected.
label: "Margine-Live"
grub2:
  default: 0
  timeout: 5
  entries:
    - name: "Install Margine"
      linux: "/images/pxeboot/vmlinuz quiet rhgb console=tty0 root=live:CDLABEL=Margine-Live enforcing=0 rd.live.image rd.live.overlay.size=4096"
      initrd: "/images/pxeboot/initrd.img"
    - name: "Install Margine (Basic Graphics Mode)"
      linux: "/images/pxeboot/vmlinuz quiet rhgb console=tty0 root=live:CDLABEL=Margine-Live enforcing=0 rd.live.image rd.live.overlay.size=4096 nomodeset"
      initrd: "/images/pxeboot/initrd.img"
    - name: "Install Margine (verbose, no splash, no serial)"
      # Field-debugging entry (added after the 2026-06-24 Beelink SER8 /
      # Ryzen 8745H hang report). Drops `quiet rhgb` so the kernel + systemd
      # print to the SCREEN, and drops console=ttyS0 so a machine with no
      # real UART cannot stall every printk on serial TX. The bounded
      # overlay keeps writable-layer sizing predictable.
      linux: "/images/pxeboot/vmlinuz console=tty0 root=live:CDLABEL=Margine-Live enforcing=0 rd.live.image rd.live.overlay.size=4096"
      initrd: "/images/pxeboot/initrd.img"
  # Raw fragment appended after the generated entries (margine-pins /
  # upstream PR: grub2.extra_cfg). With Secure Boot ON the live CachyOS
  # kernel fails shim verification until the Margine MOK is enrolled;
  # this entry chainloads MokManager so users can enroll EFI/MOK.der
  # (shipped on this ISO by live-env/src/build.sh) without leaving the
  # boot menu. mmx64.efi is Fedora-signed, so shim chainloads it fine.
  extra_cfg: |
    menuentry 'Enroll Secure Boot key (MokManager)' {
      chainloader /EFI/fedora/mmx64.efi
    }
