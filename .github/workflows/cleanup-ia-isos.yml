---
# One-shot Internet Archive cleanup.
#
# Deletes a list of old Margine ISO items from archive.org. Manual-
# dispatch only (no schedule, no auto-trigger). Reuses the existing
# IA_ACCESS_KEY / IA_SECRET_KEY repo secrets that build-disk.yml's
# publish_ia step already uses for upload.
#
# Safety: requires `confirm=DELETE` input to run the actual delete;
# any other value (the default `dry-run`) just lists what would
# happen.

name: Cleanup IA old ISOs

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DELETE to actually delete. Anything else = dry-run list.'
        required: true
        default: 'dry-run'

jobs:
  delete:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Install ia CLI
        run: pip install --quiet internetarchive

      - name: Stage IA creds
        env:
          IA_S3_ACCESS: ${{ secrets.IA_ACCESS_KEY }}
          IA_S3_SECRET: ${{ secrets.IA_SECRET_KEY }}
        run: |
          mkdir -p "$HOME/.config/internetarchive"
          umask 077
          cat > "$HOME/.config/internetarchive/ia.ini" <<EOF
          [s3]
          access = ${IA_S3_ACCESS}
          secret = ${IA_S3_SECRET}
          EOF

      - name: Confirm the keep-item has the real install.iso on IA (safety check)
        run: |
          # Safety: we don't proceed unless the keep-item contains the actual
          # install.iso file (not just the 3 auto-generated metadata files
          # _meta.sqlite + _files.xml + _meta.xml that IA creates on item
          # creation). Without this check, a publish_ia mid-upload would
          # trigger the dark of all old items leaving zero downloadable ISOs.
          KEEP=margine-anaconda-iso-20260607
          echo "Waiting for $KEEP to have install.iso on IA (max 90 min)…"
          for i in $(seq 1 90); do
            if curl -fsSL "https://archive.org/metadata/$KEEP" --max-time 30 2>/dev/null \
                | python3 -c "import json,sys; d=json.load(sys.stdin); names=[f.get('name','') for f in d.get('files',[])]; sys.exit(0 if 'install.iso' in names else 1)" 2>/dev/null; then
              echo "✓ $KEEP has install.iso on IA. Safe to proceed."
              exit 0
            fi
            echo "  ($i) install.iso not on IA yet, sleeping 60s"
            sleep 60
          done
          echo "::error::$KEEP missing install.iso after 90 min — aborting."
          exit 1

      - name: Dark old items (remove from search + profile + collection)
        run: |
          # IA does NOT let users hard-delete items via the S3 API. The
          # `_meta.*` + `_files.xml` files are protected (403 Access Denied
          # — "use metadata api instead"). Trying `ia delete --all` therefore
          # only deletes content files like install.iso AND fails early on
          # the protected metadata files, often before all content is gone.
          #
          # For the user-visible outcome we want ("don't see these on my
          # profile / search page any more") the correct operation is
          # DARKEN via metadata flag — sets noindex:true so the item drops
          # from search + collection listings + the user's profile page.
          # The item remains reachable via direct URL (history-preserving)
          # but is no longer presented to anyone browsing.
          #
          # `ia metadata <id> --modify noindex:true` is the documented
          # operation. Returns 200 on success; 403 only if the account
          # doesn't own the item (which it does, since it uploaded it).
          DARK_LIST=(
            margine-anaconda-iso-20260602
            margine-anaconda-iso-20260603
            margine-anaconda-iso-20260604
            margine-anaconda-iso-20260605
            margine-anaconda-iso-20260606
            margine-gaming-anaconda-iso-20260602
            margine-gaming-anaconda-iso-20260603
            margine-gaming-anaconda-iso-20260604
            margine-gaming-anaconda-iso-20260605
            margine-gaming-anaconda-iso-20260606
          )
          MODE='${{ inputs.confirm }}'
          if [[ "$MODE" != "DELETE" ]]; then
            echo "Dry-run mode (confirm=$MODE). Would darken:"
            printf '  %s\n' "${DARK_LIST[@]}"
            echo
            echo "Re-run with confirm=DELETE to actually darken (no hard-delete is possible via API)."
            exit 0
          fi
          set +e
          FAIL=0
          for item in "${DARK_LIST[@]}"; do
            echo "::group::darken $item"
            ia metadata "$item" --modify "noindex:true"
            rc=$?
            if (( rc != 0 )); then
              echo "::warning::$item darken failed (exit $rc)"
              FAIL=$((FAIL+1))
            else
              echo "✓ $item darkened"
            fi
            echo "::endgroup::"
          done
          if (( FAIL > 0 )); then
            echo "::error::$FAIL items failed to darken"; exit 1
          fi
          echo "Done — all $((${#DARK_LIST[@]})) items darkened. They'll drop from search within ~30 min."
