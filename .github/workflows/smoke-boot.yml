---
# Layer B — smoke-boot the published Margine image in QEMU and verify
# it actually reaches multi-user.target before we trust :stable.
#
# Layer A (in build.yml) checks image internals statically: required
# files, paths, labels, modules. Useful but insufficient — every bug
# we hit during the 2026-05-28/29 smoke test was a RUNTIME bug that
# Layer A could not see. Layer B closes that gap.
#
# Triggers: workflow_dispatch (manual rebuild any time) +
# workflow_run on every "Build Margine image" success on main (auto-
# gate before :stable promotion). Promotion to :stable happens only
# if QEMU reaches multi-user.target — see "Promote candidate →
# stable (only if boot passed)" at the bottom of this file.
#
# What it does:
#   1. Install bootc-image-builder + qemu + ovmf
#   2. Pull the latest published Margine OCI image
#   3. Build a qcow2 from it (no LUKS — automated boot can't enter
#      a passphrase; LUKS boot is exercised manually in the VM lab)
#   4. Boot the qcow2 in QEMU with serial console
#   5. Wait up to 30 min (loop below) for a usable-boot marker
#   6. If reached → pass; if not → upload serial log as artifact, fail
#
# Notes:
#   - GHA ubuntu-24.04 runners DO have KVM acceleration since 2024.
#     Boot is fast (typically ~30s to multi-user).
#   - bootc-image-builder runs as root, in a privileged container.
#   - The qcow2 stays local to the runner; we don't publish it. The
#     publication target is the OCI image (already pushed by build.yml).

name: Smoke-boot published image

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: 'OCI ref to smoke-boot (default: :candidate)'
        required: false
        default: 'ghcr.io/daniel-g-carrasco/margine:candidate'
  # Auto-trigger after every successful Build Margine image on main.
  # The guard `if: github.event.workflow_run.conclusion == 'success'`
  # on the job ensures we don't waste a runner on cancelled / failed
  # build outputs (which never get pushed to :stable anyway).
  workflow_run:
    workflows: ["Build Margine image"]
    types: [completed]
    branches: [main]

# This is the only workflow that mutates :stable. Two builds finishing
# close together must not race their promotions — queue, never cancel
# (a cancelled run mid-`skopeo copy` could leave the three stable tags
# pointing at two different digests).
concurrency:
  group: smoke-boot
  cancel-in-progress: false

jobs:
  smoke_boot:
    name: Build qcow2 + boot in QEMU
    # Skip when triggered by workflow_run if the upstream build wasn't
    # a clean success. workflow_dispatch always passes this check.
    if: >-
      github.event_name != 'workflow_run'
      || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 40   # bootc-image-builder ~5min + first-boot ~12-15min + slack
    permissions:
      contents: read
      packages: write   # needed for the candidate→stable promotion step

    steps:
      - name: Maximize build space
        # ubuntu-24.04 ships with ~14 GiB free, but BIB needs to
        # extract the 14 GB Margine bootc image into /sysroot/ostree/
        # repo and then build a qcow2 from it — easily 25 GB peak.
        # Without this step we hit "no space left on device" mid-
        # extraction (build #26919583711, 2026-06-04). Same action
        # that build-disk.yml uses for the same reason.
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9
        with:
          remove-codeql: true

      - name: Install QEMU + OVMF + tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-system-x86 ovmf swtpm
          # Verify KVM
          ls -la /dev/kvm || true
          kvm-ok 2>&1 || true

      # Resolve the ref under test to an immutable digest ONCE, and use
      # that digest for both the boot test and the promotion. Until
      # 2026-06-12 the boot step fell back to :stable while the promote
      # step fell back to :candidate — on every workflow_run trigger
      # (inputs empty) the gate booted the PREVIOUS stable and then
      # promoted the never-tested candidate. Found by the code-quality
      # review (finding A1); the tag was also re-resolved once per
      # promoted tag, a race window when a build finishes mid-smoke (A2).
      - name: Resolve image ref to digest
        id: ref
        run: |
          set -euo pipefail
          REF="${{ github.event.inputs.image_ref || 'ghcr.io/daniel-g-carrasco/margine:candidate' }}"
          if [[ "$REF" == *"@sha256:"* ]]; then
            # Dispatch input was already a digest ref.
            BASE="${REF%@*}"
            DIGEST="${REF#*@}"
          else
            BASE="${REF%:*}"
            DIGEST="$(sudo skopeo inspect --no-tags --format '{{.Digest}}' "docker://$REF")"
          fi
          echo "Testing $REF @ $DIGEST"
          {
            echo "pinned=${BASE}@${DIGEST}"
            echo "registry_image=${BASE}"
            echo "digest=${DIGEST}"
          } >> "$GITHUB_OUTPUT"

      - name: Build qcow2 with bootc-image-builder
        run: |
          set -euo pipefail
          mkdir -p output
          IMG="${{ steps.ref.outputs.pinned }}"
          echo "Building qcow2 from: $IMG"
          # Pull the image first so bootc-image-builder doesn't have to
          # re-download under root.
          sudo podman pull "$IMG"
          # bootc-image-builder needs --privileged + a few specific
          # mounts. Defaults produce qcow2 with no LUKS.
          # BIB pinned to the same digest build-disk.yml uses — this
          # workflow floated on :latest --pull=newer until 2026-06-12.
          sudo podman run --rm \
            --privileged \
            --security-opt label=type:unconfined_t \
            -v "$(pwd)/output:/output" \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder@sha256:7ae88b8d6f2cabfa971d7836b96d6cac19cd1384e658031bd154f9687e929905 \
            --type qcow2 \
            --rootfs btrfs \
            "$IMG"
          ls -la output/qcow2/
          sudo chown "$(id -u):$(id -g)" -R output/

      # Layer C (2026-06-12): offline-inject a GUI smoke probe into the
      # qcow2 — GDM autologin user + a oneshot that, once the session
      # has settled, verifies gnome-shell is alive, the distro
      # extensions actually loaded, and nothing dumped core, then
      # prints MARGINE-GUI-SMOKE: PASS/FAIL to the serial console and
      # powers off. Motivation: a crashing gnome-shell extension passed
      # Layer B (multi-user is reached regardless) and shipped.
      # WARN-ONLY for now — flip to gating after two green runs.
      # Injection failures must never block the Layer B gate: every
      # step is guarded and ends with a ::warning:: at worst.
      - name: Inject GUI smoke probe (Layer C)
        id: inject
        continue-on-error: true
        run: |
          set -euo pipefail
          QCOW=$(ls output/qcow2/*.qcow2 | head -1)
          # Trap installed BEFORE qemu-nbd connects, and covering BOTH
          # mountpoints: until 2026-06-12 /mnt/smokeboot (mounted rw
          # further down) was missing from it, so a mid-injection
          # failure disconnected nbd0 under a mounted boot partition —
          # dirty ext4 journal on the very qcow2 the gating Layer B
          # boot then runs (review finding A5).
          trap 'sudo umount -R /mnt/smokeboot 2>/dev/null || true; sudo umount -R /mnt/smoke 2>/dev/null || true; sudo qemu-nbd --disconnect /dev/nbd0 2>/dev/null || true' EXIT
          sudo modprobe nbd max_part=16
          sudo qemu-nbd --connect=/dev/nbd0 "$QCOW"
          sudo udevadm settle || sleep 2

          # Root = the btrfs partition (BIB --rootfs btrfs above).
          ROOTPART=""
          for part in /dev/nbd0p*; do
            [[ "$(sudo blkid -s TYPE -o value "$part")" == "btrfs" ]] && ROOTPART="$part"
          done
          [[ -n "$ROOTPART" ]] || { echo "::warning::Layer C: no btrfs partition found, skipping injection"; exit 1; }
          sudo mkdir -p /mnt/smoke
          sudo mount "$ROOTPART" /mnt/smoke
          R=/mnt/smoke
          if [[ ! -d "$R/ostree" ]]; then
            # content may live in a 'root' subvolume
            sudo umount /mnt/smoke
            sudo mount -o subvol=root "$ROOTPART" /mnt/smoke
          fi
          [[ -d "$R/ostree" ]] || { echo "::warning::Layer C: ostree root not found on $ROOTPART"; exit 1; }

          DEP=$(sudo sh -c 'ls -d '"$R"'/ostree/deploy/*/deploy/*.0' | head -1)
          ETC="$DEP/etc"
          VAR=$(dirname "$(dirname "$DEP")")/var
          [[ -d "$ETC" && -d "$VAR" ]] || { echo "::warning::Layer C: deployment etc/var not found"; exit 1; }
          echo "deployment: $DEP"

          # 1. Test user (uid/gid 1010), offline useradd. Password
          #    locked — GDM autologin doesn't need one.
          sudo tee -a "$ETC/passwd" >/dev/null <<<'smoke:x:1010:1010:GUI smoke:/var/home/smoke:/bin/bash'
          sudo tee -a "$ETC/group"  >/dev/null <<<'smoke:x:1010:'
          sudo tee -a "$ETC/shadow" >/dev/null <<<'smoke:!:20000:0:99999:7:::'
          sudo tee -a "$ETC/gshadow" >/dev/null <<<'smoke:!::'
          sudo mkdir -p "$VAR/home/smoke/.config"
          sudo touch "$VAR/home/smoke/.config/gnome-initial-setup-done"
          sudo chown -R 1010:1010 "$VAR/home/smoke"

          # 2. GDM autologin
          sudo tee "$ETC/gdm/custom.conf" >/dev/null <<'GDMEOF'
          [daemon]
          AutomaticLoginEnable=True
          AutomaticLogin=smoke
          GDMEOF

          # 3. Probe script + oneshot unit (enabled via static wants)
          sudo mkdir -p "$ETC/margine-smoke" "$ETC/systemd/system/multi-user.target.wants"
          sudo tee "$ETC/margine-smoke/gui-probe.sh" >/dev/null <<'PROBE'
          #!/usr/bin/env bash
          # Runs as root well after graphical.target; verdict on /dev/console.
          set -u
          out() { echo "$@" > /dev/console; }
          fail() { out "MARGINE-GUI-SMOKE: FAIL $*"; sleep 2; systemctl poweroff; exit 0; }

          # Wait for the autologin session's gnome-shell (first boot is
          # slow: flatpak preinstall etc. competes for I/O).
          for i in $(seq 1 60); do
            pgrep -u smoke -x gnome-shell >/dev/null && break
            sleep 5
          done
          pgrep -u smoke -x gnome-shell >/dev/null || fail "gnome-shell never started for autologin user"

          # Give extensions time to load, then count the enabled ones
          # through the user's session bus.
          sleep 30
          EXT=$(runuser -u smoke -- env XDG_RUNTIME_DIR=/run/user/1010                 DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/1010/bus                 gnome-extensions list --enabled 2>/dev/null | wc -l)
          [[ "$EXT" -ge 6 ]] || fail "only $EXT extensions enabled (expected >=6)"

          # The shell must still be alive AND nothing may have dumped core.
          pgrep -u smoke -x gnome-shell >/dev/null || fail "gnome-shell died during the probe window"
          CORES=$(coredumpctl --no-pager -q list 2>/dev/null | grep -c gnome-shell || true)
          [[ "$CORES" -eq 0 ]] || fail "gnome-shell dumped core ($CORES)"
          journalctl -b -q --no-pager 2>/dev/null | grep -q "Bail out!" && fail "Clutter assertion (Bail out!) in journal"

          # Branding validator (from margine-fedora-atomic) — same gjs
          # lookup the welcome dialogs use, plus About-pixmap checks.
          if [[ -x /usr/bin/margine-validate-branding ]]; then
            /usr/bin/margine-validate-branding > /tmp/branding.out 2>&1 \
              || fail "margine-validate-branding: $(tail -3 /tmp/branding.out | tr '\n' ' ')"
          fi

          out "MARGINE-GUI-SMOKE: PASS ext=$EXT"
          sleep 2
          systemctl poweroff
          PROBE
          sudo chmod 0755 "$ETC/margine-smoke/gui-probe.sh"

          sudo tee "$ETC/systemd/system/margine-gui-smoke.service" >/dev/null <<'UNIT'
          [Unit]
          Description=Margine Layer C GUI smoke probe
          After=graphical.target
          [Service]
          Type=oneshot
          ExecStartPre=/bin/sleep 150
          ExecStart=/etc/margine-smoke/gui-probe.sh
          UNIT
          sudo ln -sf ../margine-gui-smoke.service "$ETC/systemd/system/multi-user.target.wants/margine-gui-smoke.service"

          # 4. Injected files carry no SELinux labels — run this boot
          #    permissive (test VM only; the gating Layer B boot
          #    semantics are unaffected). BLS entries live on the
          #    separate /boot partition, which we mount on its own.
          BOOTPART=""
          for part in /dev/nbd0p*; do
            T="$(sudo blkid -s TYPE -o value "$part")"
            if [[ "$T" == "ext4" || "$T" == "xfs" ]]; then
              sudo mkdir -p /mnt/smokeboot
              if sudo mount -o ro "$part" /mnt/smokeboot 2>/dev/null; then
                if compgen -G '/mnt/smokeboot/loader/entries/*.conf' >/dev/null; then
                  BOOTPART="$part"
                  sudo mount -o remount,rw /mnt/smokeboot
                  break
                fi
                sudo umount /mnt/smokeboot
              fi
            fi
          done
          if [[ -n "$BOOTPART" ]]; then
            for bls in /mnt/smokeboot/loader/entries/*.conf; do
              grep -q 'enforcing=0' "$bls" || sudo sed -i 's/^options \(.*\)$/options \1 enforcing=0/' "$bls"
              echo "kargs: enforcing=0 -> $bls"
            done
            sudo umount /mnt/smokeboot
          else
            echo "::warning::Layer C: BLS entries not found — probe files may be blocked by SELinux this run"
          fi

          sudo umount -R /mnt/smoke
          sudo qemu-nbd --disconnect /dev/nbd0
          trap - EXIT
          echo "Layer C injection complete"

      - name: Boot qcow2 in QEMU and wait for multi-user.target
        id: boot
        run: |
          set -euo pipefail
          QCOW=$(ls output/qcow2/*.qcow2 | head -1)
          echo "Booting: $QCOW"

          # Auto-detect OVMF firmware paths. Ubuntu 24.04 renamed the
          # files in 2024 to a *_4M.* convention (4 MB layout); older
          # docs/templates still reference the 2 MB names. Try modern
          # names first, fall back to legacy.
          OVMF_CODE=""
          for c in \
              /usr/share/OVMF/OVMF_CODE_4M.secboot.fd \
              /usr/share/OVMF/OVMF_CODE.secboot.fd \
              /usr/share/OVMF/OVMF_CODE_4M.fd \
              /usr/share/OVMF/OVMF_CODE.fd ; do
            [[ -f "$c" ]] && OVMF_CODE="$c" && break
          done
          OVMF_VARS_SRC=""
          for v in \
              /usr/share/OVMF/OVMF_VARS_4M.fd \
              /usr/share/OVMF/OVMF_VARS.fd ; do
            [[ -f "$v" ]] && OVMF_VARS_SRC="$v" && break
          done
          if [[ -z "$OVMF_CODE" || -z "$OVMF_VARS_SRC" ]]; then
            echo "✗ OVMF firmware not found. Files present:"
            ls -la /usr/share/OVMF/ 2>&1
            exit 1
          fi
          # Copy VARS to a writable location (guest mutates it).
          cp "$OVMF_VARS_SRC" ovmf_vars.fd
          chmod 0644 ovmf_vars.fd
          echo "Using OVMF_CODE=$OVMF_CODE OVMF_VARS=$OVMF_VARS_SRC"

          # Start QEMU in the background, capture serial console to file.
          # -no-reboot exits when guest shuts down.
          # Note: Secure Boot is INTENTIONALLY DISABLED for smoke-boot.
          # SB-enabled would require the Margine MOK pre-enrolled into
          # the VARS file (interactive on first boot otherwise). The
          # CachyOS kernel signature is verified by build-time Layer A
          # checks; SB is exercised on the real hardware lab VM. Layer
          # B's job here is "does ostree+composefs+systemd reach
          # multi-user?", not "does SB chain trust intact?".
          sudo qemu-system-x86_64 \
            -enable-kvm \
            -m 4096 -smp 4 \
            -machine q35 \
            -drive if=pflash,format=raw,readonly=on,file="$OVMF_CODE" \
            -drive if=pflash,format=raw,file=ovmf_vars.fd \
            -drive file="$QCOW",format=qcow2,if=virtio \
            -netdev user,id=n0 -device virtio-net-pci,netdev=n0 \
            -serial file:serial.log \
            -display none \
            -no-reboot \
            &
          QEMU_PID=$!
          echo "QEMU PID: $QEMU_PID"

          # Watch the serial log for the marker. 30 min cap (seq 1 1800).
          # First boot of Margine downloads ~2-3 GB of Flatpaks via
          # flatpak-preinstall.service (Zen, Bitwarden, GIMP, ...),
          # plus ostree-finalize-staged, bootc-fix-deploy, machine-id
          # commit, etc. On a non-KVM GHA runner that is slow.
          # Test confirmed network.target reached at ~8 min, multi-user
          # at ~10-12 min — so 10 min was too tight, 20 min is safe.
          # Multi-marker approach (2026-06-01): systemd recent does NOT
          # always emit "Reached target multi-user.target" verbatim on
          # the serial console (seen on Fedora 44 with CachyOS kernel —
          # log goes straight to graphical.target boot events). We
          # accept any of three equivalent signals:
          #   1. gdm.service started → implies graphical.target reached
          #      → implies multi-user.target reached.
          #   2. Plymouth has quit → boot process is wrapping up.
          #   3. The getty banner "margine login:" → user-space fully up.
          # Any one of these means the boot is healthy.
          BOOT_OK=""
          GUI_RESULT=""
          GUI_DEADLINE=0
          for i in $(seq 1 1800); do
            if [[ -z "$BOOT_OK" && -f serial.log ]] && grep -qE "Started.*gdm\.service|Reached target graphical\.target|margine login:" serial.log; then
              echo "✓ Boot reached usable state at second $i"
              echo "passed=true" >> $GITHUB_OUTPUT
              BOOT_OK=$i
              # Layer C window: the probe sleeps 150s after graphical,
              # first boot is I/O-heavy — allow 8 more minutes.
              GUI_DEADLINE=$((i + 480))
            fi
            if [[ -n "$BOOT_OK" ]]; then
              if grep -q "MARGINE-GUI-SMOKE: PASS" serial.log; then GUI_RESULT=pass; break; fi
              if grep -q "MARGINE-GUI-SMOKE: FAIL" serial.log; then GUI_RESULT=fail; break; fi
              if (( i > GUI_DEADLINE )); then GUI_RESULT=timeout; break; fi
            fi
            sleep 1
          done

          if [[ -n "$BOOT_OK" ]]; then
            # ---- Layer C verdict — WARN-ONLY until proven stable ----
            # (flip the warning paths to fail=1 after two green runs)
            grep -E "MARGINE-GUI-SMOKE" serial.log || true
            echo "gui=${GUI_RESULT:-none}" >> $GITHUB_OUTPUT
            case "$GUI_RESULT" in
              pass)    echo "✓ Layer C GUI probe: PASS" ;;
              fail)    echo "::warning::Layer C GUI probe FAILED — graphical session unhealthy (extensions/coredump). See serial log artifact. This will become gating." ;;
              *)       echo "::warning::Layer C GUI probe gave no verdict (injection skipped or probe stuck) — see inject step + serial log." ;;
            esac
            # The probe powers the VM off on its own; reap or kill.
            sudo kill "$QEMU_PID" 2>/dev/null || true
            wait "$QEMU_PID" 2>/dev/null || true
            exit 0
          fi

          echo "✗ Boot did NOT reach a usable state within 30 minutes"
          echo "Last 200 lines of serial log:"
          tail -200 serial.log
          echo
          echo "=== systemd target progress (Reached vs Failed) ==="
          grep -E "Reached target|Failed to start|systemd\[1\]: Starting" serial.log | tail -40
          echo
          echo "=== units still starting (likely culprits) ==="
          grep -oE "[a-z0-9_-]+\.service" serial.log | sort | uniq -c | sort -rn | head -10
          sudo kill -9 "$QEMU_PID" 2>/dev/null || true
          echo "passed=false" >> $GITHUB_OUTPUT
          exit 1

      - name: Upload serial log
        # Always: the Layer C warn-only verdict is judged from this log.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: smoke-boot-serial-log
          path: serial.log
          retention-days: 7

      - name: Notify ntfy (boot test outcome)
        if: always() && steps.boot.outcome != 'skipped'
        env:
          NTFY_URL: ${{ secrets.NTFY_TOPIC_URL }}
        run: |
          if [[ -z "${NTFY_URL:-}" ]]; then
            echo "NTFY_TOPIC_URL secret not set, skipping notification."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [[ "${{ steps.boot.outputs.passed }}" == "true" ]]; then
            TITLE="QEMU boot OK → promoting :stable"
            PRIO="default"
            TAGS="rocket,white_check_mark"
            GUI="${{ steps.boot.outputs.gui }}"
            case "$GUI" in
              pass) MSG="Candidate healthy. GUI probe: PASS. New :stable available." ;;
              fail) MSG="Boot OK but GUI probe FAILED (warn-only) — check the serial log before trusting this stable." ; PRIO="high"; TAGS="warning" ;;
              *)    MSG="Candidate healthy. GUI probe: no verdict (${GUI:-n/a})." ;;
            esac
          else
            TITLE="QEMU boot FAILED — :stable NOT advanced"
            PRIO="high"
            TAGS="x,boom"
            MSG="Boot never reached multi-user.target. Investigate before any bootc upgrade."
          fi
          curl --silent --show-error --fail \
            -H "Title: ${TITLE}" \
            -H "Priority: ${PRIO}" \
            -H "Tags: ${TAGS}" \
            -H "Click: ${RUN_URL}" \
            -d "$MSG" \
            "$NTFY_URL" || echo "ntfy notify failed (non-fatal)"

      # Promotion step: only runs when the boot actually reached
      # multi-user.target (steps.boot.outputs.passed == 'true').
      # Copies the EXACT digest resolved in the `ref` step — the same
      # bytes the QEMU boot exercised. No tag re-resolution: a build
      # finishing mid-smoke can no longer slip an untested digest into
      # :stable (review findings A1/A2, fixed 2026-06-12).
      - name: Promote candidate → stable (only if boot passed)
        if: success() && steps.boot.outputs.passed == 'true'
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PINNED: ${{ steps.ref.outputs.pinned }}
          REGISTRY_IMAGE: ${{ steps.ref.outputs.registry_image }}
        run: |
          set -euo pipefail
          DATE_TAG="$(date -u +%Y%m%d)"
          echo "$GHCR_TOKEN" | sudo skopeo login --username "$GHCR_USER" --password-stdin ghcr.io
          for promo_tag in stable "stable.${DATE_TAG}" "${DATE_TAG}"; do
            echo "Promoting ${PINNED} → ${REGISTRY_IMAGE}:${promo_tag}"
            sudo skopeo copy --retry-times 3 --preserve-digests \
              "docker://${PINNED}" \
              "docker://${REGISTRY_IMAGE}:${promo_tag}"
          done
          echo "Promoted ${PINNED} to :stable, :stable.${DATE_TAG}, :${DATE_TAG}"
          {
            echo "### Promotion"
            echo "- digest: \`${PINNED}\`"
            echo "- tags: \`stable\`, \`stable.${DATE_TAG}\`, \`${DATE_TAG}\`"
            echo "- Layer C GUI probe: \`${{ steps.boot.outputs.gui || 'n/a' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
