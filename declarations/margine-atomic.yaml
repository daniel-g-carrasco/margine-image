    require_wireplumber: true
    validate_opengl: true
    validate_vulkan: true
    validate_vaapi: true
    validate_opencl_when_declared: true
    validate_rocm_when_declared: true
  application_channels:
    creative_gui_default: flatpak
    gaming_default: flatpak-optional
    host_drivers: rpm-ostree-or-image
  framework13_audio:
