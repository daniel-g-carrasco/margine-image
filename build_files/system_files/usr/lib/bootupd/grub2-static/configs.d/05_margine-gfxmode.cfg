# Margine: make the GRUB boot menu legible on HiDPI panels.
#
# bootc's static GRUB config (this directory) sets no gfxmode and no font, so
# the menu renders at the panel's NATIVE resolution with GRUB's built-in ~16px
# font. On a HiDPI panel (e.g. 2880x1920, ~257 DPI) that glyph is ~1.6mm tall —
# microscopic. GRUB has no DPI scaling, so the lever is the RENDER MODE: pick a
# LOW gfxmode and let the panel/GPU scaler (gfxpayload=keep) upscale it to
# native — the lower the mode, the larger the glyph. 1080p (the previous value)
# still read too small on a 257-DPI panel (Daniel, 2026-06-15), so prefer
# ~720/800p first and only fall back UP to higher modes / native.
#
# Mode list is tried left-to-right; the first one the firmware offers wins:
#   - 1280x800 / 1024x768: big glyphs on HiDPI via ~2.2-2.8x upscale (slight
#     aspect stretch on a 3:2 panel — fine for a boot menu);
#   - 1920x1080 / 1280x1024: mid fallbacks;
#   - auto: native, for low-res/old panels where 16px is already large enough.
# Only switch to gfxterm AFTER a font loads, so a font/video failure can never
# leave the menu blank. Static, universally-safe; reversible via rollback.
# (A baked larger .pf2 font would be resolution-independent but needs on-panel
#  testing of the bootupd font path; tracked as a follow-up.)
if loadfont unicode ; then
  set gfxmode=1280x800,1024x768,1920x1080,1280x1024,auto
  set gfxpayload=keep
  terminal_output gfxterm
fi
