# Margine GNOME ISO config for bootc-image-builder.
#
# This config produces an Anaconda installer ISO that:
#   1. Boots into Anaconda (graphical installer).
#   2. Installs the embedded bootc image to disk.
#   3. Runs the %post kickstart which:
#      a. Points the freshly installed system at our public registry
#         (`bootc switch`) so subsequent `bootc upgrade` calls follow
#         margine:stable.
#      b. (Bazzite pattern) Installs the Margine "fundamentals"
#         Flatpak set INTO the installer environment's
#         /var/lib/flatpak, then rsyncs that dir into the target's
#         /var/lib/flatpak — so when the user first boots into the
#         installed system, the desktop is ALREADY populated with
#         browser, mail, password manager, office, viewers, GNOME
#         productivity suite. No 10-15 minute first-boot wait.
#
# The "fundamentals" list lives at
#   /usr/share/margine/installer-flatpaks-base
# written by build_files/build.sh from installer/flatpaks-base. The
# gaming variant was retired 2026-06-06 (`ujust margine-gaming` is the
# supported path) so there is no -gaming list to concatenate.
#
# Heavy creative apps (GIMP, Inkscape, darktable, OBS, Reaper, ...)
# are NOT in the BAKE list — they ship via
# /usr/share/flatpak/preinstall.d/margine-defaults.preinstall and
# install at first boot via flatpak-preinstall.service.

[customizations.installer.kickstart]
contents = """
%post --erroronfail
# Point the freshly installed system at our public registry so
# subsequent `bootc upgrade` calls follow margine:stable. Without
# this the ostree origin remains the embedded snapshot URI from
# bootc-image-builder, and the system never sees new releases.
bootc switch --mutate-in-place --transport registry ghcr.io/daniel-g-carrasco/margine:stable
%end

%post --log=/tmp/anaconda-post-zstd.log
# === btrfs zstd:1 compression for the root subvolume (PR — 2026-06-04) ===
#
# Anaconda's default Fedora partitioning is btrfs but WITHOUT compression.
# We enable zstd:1 (fastest preset, ~30% space saved on typical desktop
# data, negligible CPU). Same level Bazzite/SteamOS use.
#
# Two layers because they cover different time windows:
#   1. `btrfs property set / compression zstd` — applies to NEW writes
#      from now on. Persists across remounts. The right primitive for
#      "from this point forward, everything new gets compressed."
#   2. `compress=zstd:1` in /etc/fstab — ensures the mount option
#      survives kernel/btrfs version transitions and is explicit in
#      the canonical fstab record (debuggability).
#
# Files already written by the bootc-image install are NOT recompressed
# here. They live mostly in /usr (ostree commit, already de-duped and
# fine), and rebuilding them would add 5-15 min to the Anaconda flow.
# The benefit kicks in for /var (logs, journals, Flatpak data) and
# /home (creator content) — both of which see most of the long-term
# disk growth.
#
# Not --erroronfail: zstd is a quality-of-life enhancement, not
# install-critical. If something is unexpected (no btrfs, fstab in
# a non-standard format, etc), log and continue.
set -uo pipefail

echo "=== zstd:1 setup ==="
mount | grep -E ' on / type' || true
echo "Initial /etc/fstab:"
cat /etc/fstab

if findmnt -no FSTYPE / | grep -q '^btrfs$'; then
  if btrfs property set / compression zstd 2>&1; then
    echo "OK: btrfs property compression=zstd set on /"
  else
    echo "WARN: btrfs property set failed (continuing)"
  fi
else
  echo "/ is not btrfs (findmnt says $(findmnt -no FSTYPE /)) — skipping btrfs property set"
fi

# Idempotently add compress=zstd:1 to /etc/fstab for the / btrfs line.
# We patch via python3 (always installed) to avoid TOML escape pain
# with sed/grep regex backslashes inside the triple-quoted contents.
python3 <<'PYEOF'
import sys
try:
    with open('/etc/fstab') as f:
        lines = f.read().splitlines()
except FileNotFoundError:
    print('WARN: /etc/fstab not found, skipping zstd patch')
    sys.exit(0)
out = []
patched = False
for line in lines:
    if line.startswith('#') or not line.strip():
        out.append(line)
        continue
    fields = line.split()
    if len(fields) >= 4 and fields[1] == '/' and fields[2] == 'btrfs':
        if 'compress=' in fields[3]:
            print('compress= already present on / btrfs line, no change')
            out.append(line)
        else:
            fields[3] = fields[3] + ',compress=zstd:1'
            out.append(' '.join(fields))
            patched = True
            print('patched / btrfs line: ' + ' '.join(fields))
    else:
        out.append(line)
with open('/etc/fstab', 'w') as f:
    f.write('\n'.join(out) + '\n')
if not patched:
    print('No btrfs / line to patch in /etc/fstab')
PYEOF

echo "Final /etc/fstab:"
cat /etc/fstab
%end

%post --nochroot --log=/mnt/sysimage/var/log/anaconda-post-flatpak-bake.log
# === Margine Flatpak BAKE — rsync from pre-baked installer image ===
#
# As of 2026-06-05 (PR migrating to Bazzite installer-image pattern):
# /var/lib/flatpak of the installer rootfs is ALREADY POPULATED with
# the Margine BAKE Flatpaks. They were installed at OCI BUILD time
# inside the margine-installer image
# — see installer/Containerfile and installer/build.sh, built by
# the build-disk.yml "Build installer image (BAKE Flatpaks)" step.
#
# This kickstart's only job is to rsync the populated
# /var/lib/flatpak from the installer rootfs to the target's
# /var/lib/flatpak. ostree+bootc reset /var per-deployment when
# they install, so without this rsync the Flatpaks would be lost
# at first reboot.
#
# Previously this %post also did `flatpak install --system` at
# install time. That failed silently on the 2026-06-04 fresh install
# (probably /tmp tmpfs OOM in installer env, since the BAKE set is
# ~5 GB). Switching to installer-image moves that download to build
# time (CI runner has plenty of disk) so install-time stays fast +
# reliable.
#
# Belt + suspenders: every BAKE app is ALSO in
# /usr/share/flatpak/preinstall.d/margine-defaults.preinstall, so if
# this rsync silently fails too the user still gets the apps via
# flatpak-preinstall.service at first boot. flatpak skips already-
# installed entries, so on success this is a no-op.
#
# Not --erroronfail: bake is QoL not install-critical (the %post
# above with `bootc switch` keeps --erroronfail because THAT IS
# install-critical).

set -uo pipefail

log() { printf '[%s] %s\n' "$(date -u +%H:%M:%S)" "$*"; }

log "Locate target deployment under /mnt/sysimage/ostree/deploy/"
DEPLOY_DIR=$(ls -d /mnt/sysimage/ostree/deploy/default/deploy/*.0 2>/dev/null | head -1)
if [[ -z "$DEPLOY_DIR" ]]; then
  log "ERROR: no ostree deployment found under /mnt/sysimage — cannot rsync flatpaks"
  ls -la /mnt/sysimage/ostree/deploy/ 2>&1 || true
  exit 0
fi
log "Target deploy dir = $DEPLOY_DIR"

mkdir -p "$DEPLOY_DIR/var/lib"
if [[ -d /var/lib/flatpak ]]; then
  installed=$(find /var/lib/flatpak/app -maxdepth 1 -mindepth 1 -type d 2>/dev/null | wc -l)
  log "Source /var/lib/flatpak has $installed installed apps (pre-baked in installer image)"
  log "rsync /var/lib/flatpak → $DEPLOY_DIR/var/lib/"
  rsync -aAXUHK --open-noatime /var/lib/flatpak "$DEPLOY_DIR/var/lib/"
  sync
  log "rsync complete — target system /var/lib/flatpak populated"
else
  log "WARN: /var/lib/flatpak does not exist on installer env"
  log "      (installer image did not bake any Flatpaks?)"
fi
%end
"""

# Trim the Anaconda module set to what we actually need on a Margine
# install: storage + runtime. Network is auto-configured by NetworkManager
# at first boot; users/security/services/subscription/timezone come from
# Margine's own bootstrap (configure-* chain) at first login.
#
# BUT: Network module is INTENTIONALLY ENABLED now — the %post --nochroot
# above does `flatpak install` from Flathub, which needs network. NM
# auto-configures wired DHCP without a Network module GUI, so this is
# usually transparent on test VMs; but on a real laptop with Wi-Fi the
# user needs the Network UI to pick an AP. Re-enabled.
[customizations.installer.modules]
enable = [
  "org.fedoraproject.Anaconda.Modules.Storage",
  "org.fedoraproject.Anaconda.Modules.Runtime",
  "org.fedoraproject.Anaconda.Modules.Network"
]
disable = [
  "org.fedoraproject.Anaconda.Modules.Security",
  "org.fedoraproject.Anaconda.Modules.Services",
  "org.fedoraproject.Anaconda.Modules.Users",
  "org.fedoraproject.Anaconda.Modules.Subscription",
  "org.fedoraproject.Anaconda.Modules.Timezone"
]
