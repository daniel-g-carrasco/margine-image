name: Lint

# Every executable in scripts/ is extensionless, so discovery is
# shebang-based, not extension-based — a plain `shellcheck *.sh` here
# would lint nothing. Born from the 2026-06-12 code-quality review:
# both real bugs that week lived in places no linter was looking at.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: actionlint (workflow files, incl. shellcheck on run blocks)
        uses: docker://rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: -color

      - name: shellcheck (shebang-aware over scripts/)
        run: |
          set -euo pipefail
          mapfile -t SH < <(grep -rlE '^#!.*\b(ba)?sh\b' scripts/ --exclude-dir=__pycache__)
          printf 'bash scripts: %s\n' "${SH[@]}"
          shellcheck -S warning "${SH[@]}"

      - name: ruff (shebang-aware over scripts/)
        run: |
          set -euo pipefail
          mapfile -t PY < <(grep -rlE '^#!.*python' scripts/ --exclude-dir=__pycache__)
          printf 'python scripts: %s\n' "${PY[@]}"
          pipx run ruff check "${PY[@]}"

      - name: YAML well-formedness (declarations)
        run: |
          set -euo pipefail
          python3 -c "import sys, yaml; yaml.safe_load(open('declarations/margine-atomic.yaml')); print('declarations OK')"
