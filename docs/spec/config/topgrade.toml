# Margine Fedora Atomic Topgrade profile.
#
# Topgrade is allowed to update accessory channels. It must not own the base OS,
# firmware, boot policy, Secure Boot, TPM2, or rollback semantics.

[misc]
pre_sudo = true
assume_yes = false
cleanup = true
show_skipped = true
no_self_update = true

# Margine update-all owns these phases explicitly.
disable = [
  "system",
  "firmware",
]

[linux]
# Keep Fedora Atomic base updates in scripts/update-all.
rpm_ostree = false
bootc = false

# If a non-Atomic Fedora toolbox/container runs Topgrade, use refreshed metadata.
dnf_arguments = "--refresh"

[flatpak]
# Phase 1 uses system-level Flatpaks unless the lab decides otherwise.
use_sudo = true

[distrobox]
use_root = false
containers = []
# Declare specific container names here when ready to enable distrobox updates.

[containers]
runtime = "podman"
system_prune = false
use_sudo = false

[git]
pull_predefined = false
