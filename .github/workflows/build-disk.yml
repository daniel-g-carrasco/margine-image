---
# Margine ISO + qcow2 builder.
#
# Builds Anaconda installer ISO (single-step Margine install) and
# raw qcow2 (VM-ready disk image) from the currently-promoted
# ghcr.io/<owner>/margine:stable. ISO and qcow2 are then rsync'd
# to the `edge` VM (110) on PVE1 which serves them at
# https://files.the-empty.place/margine/ via Caddy.
#
# Runs on the same self-hosted runner as build.yml. We rely on the
# same storage-health/cleanup primitives.
#
# Cadence: manual trigger only for now (workflow_dispatch). Once
# `:stable` updates daily, you can switch to workflow_run after
# smoke-boot promotion to auto-publish a fresh ISO every release.

name: Build disk images

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - './disk_config/disk.toml'
      - './disk_config/iso-gnome.toml'
      - './.github/workflows/build-disk.yml'

env:
  IMAGE_NAME: margine
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "stable"
  BIB_IMAGE: "quay.io/centos-bootc/bootc-image-builder:latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ISO + qcow2 → publish to edge
    runs-on: [self-hosted, margine-builder]
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        disk-type: ["qcow2", "anaconda-iso"]
    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          USER_UID=$(id -u)
          USER_GID=$(id -g)
          DISK_TYPE=$(echo "${{ matrix.disk-type }}" | tr ' ' '-')
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}
          echo "DISK_TYPE=${DISK_TYPE}" >> ${GITHUB_ENV}
          echo "USER_UID=${USER_UID}" >> ${GITHUB_ENV}
          echo "USER_GID=${USER_GID}" >> ${GITHUB_ENV}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Pre-build login to GHCR (for base-image pull)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | timeout 30 podman login ghcr.io \
            -u "${{ github.actor }}" --password-stdin

      - name: Build disk image
        id: build
        uses: osbuild/bootc-image-builder-action@main
        with:
          builder-image: ${{ env.BIB_IMAGE }}
          config-file: ${{ matrix.disk-type == 'anaconda-iso' && './disk_config/iso-gnome.toml' || './disk_config/disk.toml' }}
          image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}
          chown: ${{ env.USER_UID }}:${{ env.USER_GID }}
          types: ${{ matrix.disk-type }}
          additional-args: --use-librepo=True

      - name: List + sha256 outputs
        id: outputs
        run: |
          set -euo pipefail
          OUTDIR="${{ steps.build.outputs.output-directory }}"
          echo "outdir=$OUTDIR" >> "$GITHUB_OUTPUT"
          ls -la "$OUTDIR"
          find "$OUTDIR" -type f | while read -r f; do
            sha256sum "$f" | tee -a "$OUTDIR/SHA256SUMS"
          done
          echo "files=$(find "$OUTDIR" -type f -name '*.iso' -o -name '*.qcow2' | tr '\n' ' ')" >> "$GITHUB_OUTPUT"

      - name: Publish to edge over rsync
        # Uses a dedicated SSH key on the builder restricted (via
        # authorized_keys command="rsync ...") to scp/rsync into
        # /var/www/files-margine. The key itself is generated and
        # authorized via docs/operations/iso-distribution.md.
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          OUTDIR="${{ steps.outputs.outdir }}"
          rsync -av --progress \
            -e "ssh -i /home/gha-runner/.ssh/edge-files-margine -o StrictHostKeyChecking=accept-new" \
            "$OUTDIR"/ \
            edge-files-margine@192.168.2.31:/var/www/files-margine/

      - name: Builder post-build hygiene (self-hosted only)
        if: always() && runner.environment != 'github-hosted'
        timeout-minutes: 3
        run: |
          # Free local copy: edge has it now, no reason to keep ~5 GiB on builder.
          OUTDIR="${{ steps.outputs.outdir }}"
          if [[ -n "$OUTDIR" && -d "$OUTDIR" ]]; then
            rm -rf "$OUTDIR" || true
          fi
          # Sweep tmpfs left-overs and prune cache mounts
          rm -f /var/tmp/margine*.tar /tmp/margine*.tar 2>/dev/null || true
          df -h /

      - name: Notify ntfy (disk-build outcome)
        if: always()
        env:
          NTFY_URL: ${{ secrets.NTFY_TOPIC_URL }}
        run: |
          if [[ -z "${NTFY_URL:-}" ]]; then
            echo "NTFY_TOPIC_URL secret not set, skipping notification."
            exit 0
          fi
          STATUS="${{ job.status }}"
          DISK="${{ matrix.disk-type }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          case "$STATUS" in
            success)
              TITLE="Disk image ${DISK} published"
              PRIO="default"
              TAGS="cd,white_check_mark"
              MSG="Disponibile su https://files.the-empty.place/margine/"
              ;;
            failure)
              TITLE="Disk image ${DISK} BUILD FAILED"
              PRIO="high"
              TAGS="x,cd"
              MSG="Vedi i log: ${RUN_URL}"
              ;;
            *)
              TITLE="Disk image ${DISK} status: ${STATUS}"
              PRIO="low"
              TAGS="warning"
              MSG=""
              ;;
          esac
          curl --silent --show-error --fail \
            -H "Title: ${TITLE}" \
            -H "Priority: ${PRIO}" \
            -H "Tags: ${TAGS}" \
            -H "Click: ${RUN_URL}" \
            -d "${MSG}" \
            "$NTFY_URL" || echo "ntfy notify failed (non-fatal)"
