---
# Margine Gaming variant — separate OCI image built FROM the already-
# validated margine:stable. Trigger model:
#
#   workflow_dispatch  → manual rebuild any time
#   workflow_run       → automatically after every successful smoke-boot
#                        of the base image (so the variant is always
#                        within minutes of the latest blessed :stable)
#   schedule           → weekly Sun 05:00 UTC, after the base nightly
#
# Pipeline shape mirrors build.yml: build_push → sign → notify, split
# (see ~/.claude/.../memory/feedback_ci_split_long_jobs.md). No MOK
# secrets needed (kernel already signed in the base image).

name: Build Margine Gaming image

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Smoke-boot published image"]
    types: [completed]
    branches: [main]
  schedule:
    # Weekly: Sun 05:00 UTC = 1h after the base nightly. The base
    # candidate will have been promoted to :stable by then (smoke-boot
    # runs immediately after build.yml and finishes in ~25 min).
    - cron: '0 5 * * 0'

env:
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  IMAGE_NAME: margine-gaming
  IMAGE_DESC: "Margine Gaming — Margine + gamescope/mangohud/etc. + gaming Flatpaks"
  IMAGE_KEYWORDS: "bootc,ublue,bluefin,cachyos,margine,gaming,steam"
  CANDIDATE_TAG: "candidate"
  BASE_IMAGE: "ghcr.io/${{ github.repository_owner }}/margine:stable"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build_push:
    name: Build + rechunk + push (gaming variant)
    runs-on: ubuntu-24.04
    # Skip when triggered by workflow_run if the upstream smoke-boot
    # wasn't a clean success. workflow_dispatch / schedule pass through.
    if: >-
      github.event_name != 'workflow_run'
      || github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      image_ref: ${{ steps.push.outputs.image_ref }}
      tags: ${{ steps.metadata.outputs.tags }}

    steps:
      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9
        with:
          remove-codeql: true

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 1

      - name: Pre-build login to GHCR
        # Authenticated pull of the base ghcr.io/.../margine:stable.
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io \
            -u "${{ github.actor }}" --password-stdin

      - name: Get current date
        id: date
        run: |
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "ymd=$(date -u +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Image metadata
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        id: metadata
        with:
          tags: |
            type=raw,value=${{ env.CANDIDATE_TAG }}
            type=raw,value=${{ env.CANDIDATE_TAG }}.{{date 'YYYYMMDD'}}
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/margine-image/${{ github.sha }}/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/margine-image/blob/${{ github.sha }}/Containerfile.gaming
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/margine-image/tree/${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ env.CANDIDATE_TAG }}.{{date 'YYYYMMDD'}}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.prerelease=false
            containers.bootc=1
          sep-tags: " "
          sep-annotations: " "

      - name: Build image (no MOK — kernel pre-signed in base)
        id: build_image
        uses: redhat-actions/buildah-build@v2
        with:
          containerfiles: |
            ./Containerfile.gaming
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          oci: false
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}

      - name: Move built image to root storage for rechunk
        run: |
          set -euo pipefail
          IMG="${{ env.IMAGE_NAME }}:${{ env.CANDIDATE_TAG }}"
          ARCHIVE="/tmp/${{ env.IMAGE_NAME }}.oci.tar"
          rm -f "$ARCHIVE"
          podman save --format oci-archive --output "$ARCHIVE" "localhost/$IMG"
          sudo skopeo copy --retry-times 3 --preserve-digests \
            "oci-archive:$ARCHIVE" \
            "containers-storage:$IMG"
          sudo podman image exists "$IMG"
          rm -f "$ARCHIVE"

      - name: ReChunk image
        id: rechunk
        uses: hhd-dev/rechunk@v1.2.4
        with:
          ref: ${{ env.IMAGE_NAME }}:${{ env.CANDIDATE_TAG }}
          version: ${{ env.CANDIDATE_TAG }}.${{ steps.date.outputs.ymd }}
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.licenses=Apache-2.0
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=Apache-2.0
            containers.bootc=1
          revision: ${{ github.sha }}

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo skopeo login \
            -u "${{ github.actor }}" --password-stdin ghcr.io

      - name: Push rechunked image to GHCR
        id: push
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail
          IMG_FULL="${IMAGE_REGISTRY,,}/${IMAGE_NAME,,}"
          DIGEST=""
          for tag in ${{ steps.metadata.outputs.tags }}; do
            sudo skopeo copy --retry-times 3 \
              --dest-creds="${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              --digestfile=/tmp/digest.txt \
              "${{ steps.rechunk.outputs.ref }}" \
              "docker://${IMG_FULL}:${tag}"
            if [[ -z "$DIGEST" ]]; then
              DIGEST="$(cat /tmp/digest.txt)"
            fi
          done
          if [[ -z "$DIGEST" || ! "$DIGEST" =~ ^sha256: ]]; then
            echo "::error::failed to capture manifest digest"
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMG_FULL}@${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Pushed manifest: ${IMG_FULL}@${DIGEST}"

  sign:
    name: Cosign sign (by digest)
    needs: build_push
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Cosign login to GHCR
        run: |
          cosign login ghcr.io \
            -u "${{ github.actor }}" \
            -p "${{ secrets.GITHUB_TOKEN }}"

      - name: Sign image by digest
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ""
        run: |
          set -euo pipefail
          IMAGE_REF="${{ needs.build_push.outputs.image_ref }}"
          if [[ -z "$IMAGE_REF" ]]; then
            echo "::error::needs.build_push.outputs.image_ref is empty"
            exit 1
          fi
          echo "Signing: ${IMAGE_REF}"
          cosign sign -y --key env://COSIGN_PRIVATE_KEY "${IMAGE_REF}"

  promote_to_stable:
    name: Promote candidate → stable (no smoke-boot needed — base was validated)
    # The base image (margine:stable) was already smoke-booted before this
    # variant build was triggered (we run on smoke-boot success). The
    # variant only adds RPMs + Flatpak preinstall lines; a second
    # full smoke-boot would be ~25 min for very low marginal signal.
    # Keep the door open via a follow-up smoke-boot-gaming workflow
    # in the future, but for now promote immediately after signing.
    needs: [build_push, sign]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo skopeo login \
            --username "${{ github.actor }}" --password-stdin ghcr.io

      - name: Copy :candidate → :stable, :stable.YYYYMMDD, :YYYYMMDD
        env:
          IMG_REF: ${{ needs.build_push.outputs.image_ref }}
        run: |
          set -euo pipefail
          DATE_TAG="$(date -u +%Y%m%d)"
          REGISTRY_IMAGE="${IMG_REF%@*}"   # strip @sha256:... → ghcr.io/.../margine-gaming
          for promo_tag in stable "stable.${DATE_TAG}" "${DATE_TAG}"; do
            echo "Promoting → ${REGISTRY_IMAGE}:${promo_tag}"
            sudo skopeo copy --retry-times 3 --preserve-digests \
              "docker://${IMG_REF}" \
              "docker://${REGISTRY_IMAGE}:${promo_tag}"
          done

  notify:
    name: ntfy notification
    needs: [build_push, sign, promote_to_stable]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: always()
    steps:
      - name: Notify ntfy (aggregated)
        env:
          NTFY_URL: ${{ secrets.NTFY_TOPIC_URL }}
          BUILD_RESULT: ${{ needs.build_push.result }}
          SIGN_RESULT:  ${{ needs.sign.result }}
          PROMOTE_RESULT: ${{ needs.promote_to_stable.result }}
        run: |
          if [[ -z "${NTFY_URL:-}" ]]; then
            echo "NTFY_TOPIC_URL secret not set, skipping notification."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [[ "$BUILD_RESULT" == "success" && "$SIGN_RESULT" == "success" && "$PROMOTE_RESULT" == "success" ]]; then
            TITLE="Gaming variant OK → :stable promoted"
            PRIO="default"
            TAGS="white_check_mark,video_game"
            MSG="margine-gaming:stable now available. End users: bootc switch ghcr.io/${{ github.repository_owner }}/margine-gaming:stable"
          elif [[ "$BUILD_RESULT" == "failure" ]]; then
            TITLE="Gaming build FAILED (image build)"
            PRIO="high"
            TAGS="x,video_game"
            MSG="Containerfile.gaming or gaming/install.sh failed. See ${RUN_URL}"
          elif [[ "$SIGN_RESULT" == "failure" ]]; then
            TITLE="Gaming PARTIAL → image pushed, sign FAILED"
            PRIO="high"
            TAGS="x,closed_lock_with_key,video_game"
            MSG="Retry just the sign job: gh run rerun --failed ${{ github.run_id }}"
          elif [[ "$PROMOTE_RESULT" == "failure" ]]; then
            TITLE="Gaming PARTIAL → signed but promotion FAILED"
            PRIO="high"
            TAGS="x,video_game"
            MSG="margine-gaming:candidate is signed; promotion to :stable failed. Retry: gh run rerun --failed ${{ github.run_id }}"
          else
            TITLE="Gaming build status: build=${BUILD_RESULT}, sign=${SIGN_RESULT}, promote=${PROMOTE_RESULT}"
            PRIO="default"
            TAGS="warning,video_game"
            MSG=""
          fi
          curl --silent --show-error --fail \
            -H "Title: ${TITLE}" \
            -H "Priority: ${PRIO}" \
            -H "Tags: ${TAGS}" \
            -H "Click: ${RUN_URL}" \
            -d "$MSG" \
            "$NTFY_URL" || echo "ntfy notify failed (non-fatal)"
