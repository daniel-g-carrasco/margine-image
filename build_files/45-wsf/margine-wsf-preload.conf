# Margine: load wayland-scroll-factor's libinput interposer in
# gnome-shell. Process-guarded no-op outside gnome-shell; factors
# default to 1.0 (inert) until the user runs `wsf set ...` / wsf-gui,
# after which changes apply live on the next gesture (no logout).
# Unit-level Environment= overrides the user-manager environment, so a
# per-user `wsf enable` (environment.d) cannot stack a second copy.
# Full opt-out: `ujust wsf-preload off` (writes an /etc drop-in with
# UnsetEnvironment=LD_PRELOAD).
[Service]
Environment=LD_PRELOAD=/usr/lib64/wayland-scroll-factor/libwsf_preload.so
