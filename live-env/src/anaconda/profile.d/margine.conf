# Anaconda configuration profile for Margine (Titanoboa / ADR-0008).
# Modeled on Aurora's iso_files/configure_iso_anaconda.sh profile
# (live-env/references/aurora/) + Bluefin's. Selects the WebUI engine
# (ADR-0008 §3.3) and the BTRFS+zstd defaults.
#
# Profile Detection: Margine keeps ID=fedora (inherited from Bluefin),
# so os_id alone would collide with stock Fedora. We additionally match
# variant_id=margine — both must hold, so this profile only activates on
# a real Margine image, never on plain Fedora.
#
# Storage note: default_partitioning here is AUTHORITATIVE — it drives the
# WebUI AUTOMATIC partitioning flow. interactive-defaults.ks intentionally
# carries NO explicit clearpart/part (those select CUSTOM and crash
# anaconda-webui 68 — see that file's header). The ESP stays at Anaconda's
# hardcoded ~600 MiB default; a 4 GiB ESP is not achievable on the WebUI
# AUTOMATIC path with stock Anaconda and is deferred until F44 ships
# anaconda-webui >= 69 (then explicit `part` becomes safe again).

[Profile]
profile_id = margine

[Profile Detection]
os_id = fedora
variant_id = margine

[Network]
default_on_boot = FIRST_WIRED_WITH_LINK

[Bootloader]
efi_dir = fedora
menu_auto_hide = True

[Storage]
default_scheme = BTRFS
btrfs_compression = zstd:1
default_partitioning =
    /     (min 1 GiB)
    /home (min 500 MiB, free 50 GiB)
    /var  (btrfs)

[User Interface]
webui_web_engine = slitherer
hidden_spokes =
    NetworkSpoke
    PasswordSpoke
    UserSpoke
hidden_webui_pages =
    root-password
    anaconda-screen-accounts
