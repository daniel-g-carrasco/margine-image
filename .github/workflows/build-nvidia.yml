name: Build Margine NVIDIA variant (experimental)

# EXPERIMENTAL — see ADR 0009 (margine-fedora-atomic/docs/adr/0009-nvidia-variant.md).
#
# Builds the NVIDIA variant: the SAME signed CachyOS kernel plus an
# akmod-nvidia[-open] kmod compiled against kernel-cachyos-devel-matched and
# re-signed with the Margine MOK (so Secure Boot stays ON, one enrollment).
# The build logic lives behind the ENABLE_NVIDIA build-arg in
# Containerfile + build_files/custom-kernel/install.sh; the base build never
# runs it.
#
# Manual ONLY: no push/schedule trigger, no smoke gate, no promotion to
# :stable. It pushes a clearly-experimental tag (default :nvidia — the tag the
# nvidia ISO build + the site selector consume; pass nvidia-test for throwaway
# runs). There
# is NO NVIDIA GPU in CI, so a green run proves only that the kmod COMPILES +
# SIGNS — it does NOT prove the driver actually drives a real NVIDIA GPU. That
# must be validated on real hardware before :stable-nvidia is trusted/promoted
# (Margine's reference machine is AMD). This is genuinely novel territory
# (nvidia-against-a-CachyOS-kernel under bootc has no upstream precedent), so
# expect several iterations to make it build green.

on:
  workflow_dispatch:
    inputs:
      nvidia_kmod:
        description: "kmod flavour"
        default: nvidia-open
        type: choice
        options:
          - nvidia-open
          - nvidia
      tag:
        description: "image tag to push (experimental; :nvidia is what the ISO/selector consume)"
        default: nvidia
        type: string
  schedule:
    # Sun 05:00 UTC — the same weekly cadence as the stable image (build.yml,
    # Sun 04:00), offset so the two heavy builds don't compete for runners.
    # This build goes straight from the Containerfile on the bluefin-dx base
    # (it does NOT layer on margine:stable), so it needs no ordering with the
    # 04:00 run — the weekly rebuild just keeps :nvidia tracking upstream at
    # the same rhythm. build-disk.yml's workflow_run trigger then rebuilds +
    # publishes the nvidia ISO once this run succeeds.
    # (Scheduled runs have no inputs, so the steps default to nvidia-open/:nvidia.)
    - cron: '0 5 * * 0'

# Least privilege (Scorecard Token-Permissions): nothing at the workflow
# level; the single job below elevates to exactly what it needs.
permissions: {}

concurrency:
  group: build-nvidia
  cancel-in-progress: true

jobs:
  build-nvidia:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write   # push the :nvidia tag to GHCR
    steps:
      - name: Free disk space (nvidia + CUDA userland is large)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" 2>/dev/null || true
          df -h / | tail -1

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io \
            -u "${{ github.actor }}" --password-stdin

      - name: Stage MOK secrets for BuildKit
        env:
          MOK_KEY: ${{ secrets.MOK_KEY }}
          MOK_CERT: ${{ secrets.MOK_CERT }}
        run: |
          mkdir -p /tmp/margine-secrets
          chmod 700 /tmp/margine-secrets
          printf '%s' "$MOK_KEY"  > /tmp/margine-secrets/MOK.key
          printf '%s' "$MOK_CERT" > /tmp/margine-secrets/MOK.pem
          chmod 600 /tmp/margine-secrets/*

      - name: Build NVIDIA variant (build-arg ENABLE_NVIDIA=1)
        run: |
          set -euo pipefail
          IMG="ghcr.io/${{ github.repository_owner }}/margine"
          sudo -E buildah build \
            --file ./Containerfile \
            --format docker \
            --layers \
            --build-arg "ENABLE_NVIDIA=1" \
            --build-arg "NVIDIA_KMOD=${{ inputs.nvidia_kmod || 'nvidia-open' }}" \
            --secret id=mok-key,src=/tmp/margine-secrets/MOK.key \
            --secret id=mok-cert,src=/tmp/margine-secrets/MOK.pem \
            --tag "${IMG}:${{ inputs.tag || 'nvidia' }}" \
            .
          sudo buildah images "${IMG}:${{ inputs.tag || 'nvidia' }}"

      - name: Push experimental tag
        run: |
          IMG="ghcr.io/${{ github.repository_owner }}/margine"
          sudo buildah push "${IMG}:${{ inputs.tag || 'nvidia' }}"
          echo "Pushed ${IMG}:${{ inputs.tag || 'nvidia' }} — EXPERIMENTAL, not validated on real NVIDIA hardware."

      - name: Wipe staged secrets
        if: always()
        run: rm -rf /tmp/margine-secrets
