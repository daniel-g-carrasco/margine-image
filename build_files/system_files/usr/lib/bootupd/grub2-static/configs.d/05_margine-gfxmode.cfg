# Margine: legible GRUB boot menu on HiDPI panels via a BAKED LARGE FONT.
#
# GRUB has no DPI scaling. The previous approach (a low gfxmode + gfxpayload=
# keep upscale) was unreliable: GRUB can only pick a mode the firmware GOP/VBE
# actually exposes (see `videoinfo`), and on amdgpu UEFI it typically falls
# back to the native panel resolution -> a ~16px glyph again (~1.6mm on a
# 2880x1920 / 257-DPI panel). So every gfxmode iteration was effectively a
# no-op. The resolution-INDEPENDENT lever is a bigger glyph bitmap = a large
# .pf2 font.
#
# margine.pf2 is a 36px Liberation Mono built by grub2-mkfont at image build
# (build_files/50-branding/install.sh) with family name "Margine", so its
# embedded font name is exactly "Margine Regular 36" — that's what
# gfxterm_font must select (gfxterm uses its tiny built-in font otherwise).
# Render at NATIVE resolution (gfxpayload=keep) so the firmware is never asked
# for an unsupported mode; the large font alone gives legible glyphs.
#
# IMPORTANT deployment note: bootupd renders /boot/grub2/grub.cfg from these
# drop-ins ONLY at OS install (or `bootupctl ... --with-static-configs`), NOT
# on `bootc upgrade`. Nor does it copy this font to /boot. Existing installs
# must run `ujust margine-grub-hidpi` once (copies margine.pf2 to
# /boot/grub2/fonts/ + re-renders grub.cfg) and reboot. Fresh installs get it
# automatically.
#
# At boot $prefix = /boot/grub2 (the ext4 /boot partition), so the font path
# is $prefix/fonts/margine.pf2. Only switch to gfxterm AFTER a font loads, so
# a missing font can never blank the menu; fall back to the stock unicode font
# (legible-but-small) if margine.pf2 isn't on /boot yet (e.g. an upgraded
# install that hasn't run the ujust recipe). Static + universally safe;
# reversible via rollback.
if loadfont $prefix/fonts/margine.pf2 ; then
  set gfxterm_font="Margine Regular 36"
  set gfxpayload=keep
  terminal_output gfxterm
elif loadfont unicode ; then
  set gfxpayload=keep
  terminal_output gfxterm
fi
