---
# Layer B — smoke-boot the published Margine image in QEMU and verify
# it actually reaches multi-user.target before we trust :stable.
#
# Layer A (in build.yml) checks image internals statically: required
# files, paths, labels, modules. Useful but insufficient — every bug
# we hit during the 2026-05-28/29 smoke test was a RUNTIME bug that
# Layer A could not see. Layer B closes that gap.
#
# Current trigger: workflow_dispatch only. Once it's been validated
# end-to-end a few times, change to workflow_run after Build Margine
# image so every push to main gets smoke-booted before being trusted.
#
# What it does:
#   1. Install bootc-image-builder + qemu + ovmf
#   2. Pull the latest published Margine OCI image
#   3. Build a qcow2 from it (no LUKS — automated boot can't enter
#      a passphrase; LUKS boot is exercised manually in the VM lab)
#   4. Boot the qcow2 in QEMU with serial console
#   5. Wait up to 10 min for "Reached target Multi-User System"
#   6. If reached → pass; if not → upload serial log as artifact, fail
#
# Notes:
#   - GHA ubuntu-24.04 runners DO have KVM acceleration since 2024.
#     Boot is fast (typically ~30s to multi-user).
#   - bootc-image-builder runs as root, in a privileged container.
#   - The qcow2 stays local to the runner; we don't publish it. The
#     publication target is the OCI image (already pushed by build.yml).

name: Smoke-boot published image

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: 'OCI ref to smoke-boot (default: :candidate)'
        required: false
        default: 'ghcr.io/daniel-g-carrasco/margine:candidate'
  # Auto-trigger after every successful Build Margine image on main.
  # The guard `if: github.event.workflow_run.conclusion == 'success'`
  # on the job ensures we don't waste a runner on cancelled / failed
  # build outputs (which never get pushed to :stable anyway).
  workflow_run:
    workflows: ["Build Margine image"]
    types: [completed]
    branches: [main]

jobs:
  smoke_boot:
    name: Build qcow2 + boot in QEMU
    # Skip when triggered by workflow_run if the upstream build wasn't
    # a clean success. workflow_dispatch always passes this check.
    if: >-
      github.event_name != 'workflow_run'
      || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 40   # bootc-image-builder ~5min + first-boot ~12-15min + slack
    permissions:
      contents: read
      packages: write   # needed for the candidate→stable promotion step

    steps:
      - name: Install QEMU + OVMF + tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-system-x86 ovmf swtpm
          # Verify KVM
          ls -la /dev/kvm || true
          kvm-ok 2>&1 || true

      - name: Build qcow2 with bootc-image-builder
        run: |
          set -euo pipefail
          mkdir -p output
          IMG="${{ github.event.inputs.image_ref || 'ghcr.io/daniel-g-carrasco/margine:stable' }}"
          echo "Building qcow2 from: $IMG"
          # Pull the image first so bootc-image-builder doesn't have to
          # re-download under root.
          sudo podman pull "$IMG"
          # bootc-image-builder needs --privileged + a few specific
          # mounts. Defaults produce qcow2 with no LUKS.
          sudo podman run --rm \
            --privileged \
            --pull=newer \
            --security-opt label=type:unconfined_t \
            -v "$(pwd)/output:/output" \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type qcow2 \
            --rootfs btrfs \
            "$IMG"
          ls -la output/qcow2/
          sudo chown "$(id -u):$(id -g)" -R output/

      - name: Boot qcow2 in QEMU and wait for multi-user.target
        id: boot
        run: |
          set -euo pipefail
          QCOW=$(ls output/qcow2/*.qcow2 | head -1)
          echo "Booting: $QCOW"

          # Auto-detect OVMF firmware paths. Ubuntu 24.04 renamed the
          # files in 2024 to a *_4M.* convention (4 MB layout); older
          # docs/templates still reference the 2 MB names. Try modern
          # names first, fall back to legacy.
          OVMF_CODE=""
          for c in \
              /usr/share/OVMF/OVMF_CODE_4M.secboot.fd \
              /usr/share/OVMF/OVMF_CODE.secboot.fd \
              /usr/share/OVMF/OVMF_CODE_4M.fd \
              /usr/share/OVMF/OVMF_CODE.fd ; do
            [[ -f "$c" ]] && OVMF_CODE="$c" && break
          done
          OVMF_VARS_SRC=""
          for v in \
              /usr/share/OVMF/OVMF_VARS_4M.fd \
              /usr/share/OVMF/OVMF_VARS.fd ; do
            [[ -f "$v" ]] && OVMF_VARS_SRC="$v" && break
          done
          if [[ -z "$OVMF_CODE" || -z "$OVMF_VARS_SRC" ]]; then
            echo "✗ OVMF firmware not found. Files present:"
            ls -la /usr/share/OVMF/ 2>&1
            exit 1
          fi
          # Copy VARS to a writable location (guest mutates it).
          cp "$OVMF_VARS_SRC" ovmf_vars.fd
          chmod 0644 ovmf_vars.fd
          echo "Using OVMF_CODE=$OVMF_CODE OVMF_VARS=$OVMF_VARS_SRC"

          # Start QEMU in the background, capture serial console to file.
          # -no-reboot exits when guest shuts down.
          # Note: Secure Boot is INTENTIONALLY DISABLED for smoke-boot.
          # SB-enabled would require the Margine MOK pre-enrolled into
          # the VARS file (interactive on first boot otherwise). The
          # CachyOS kernel signature is verified by build-time Layer A
          # checks; SB is exercised on the real hardware lab VM. Layer
          # B's job here is "does ostree+composefs+systemd reach
          # multi-user?", not "does SB chain trust intact?".
          sudo qemu-system-x86_64 \
            -enable-kvm \
            -m 4096 -smp 4 \
            -machine q35 \
            -drive if=pflash,format=raw,readonly=on,file="$OVMF_CODE" \
            -drive if=pflash,format=raw,file=ovmf_vars.fd \
            -drive file="$QCOW",format=qcow2,if=virtio \
            -netdev user,id=n0 -device virtio-net-pci,netdev=n0 \
            -serial file:serial.log \
            -display none \
            -no-reboot \
            &
          QEMU_PID=$!
          echo "QEMU PID: $QEMU_PID"

          # Watch the serial log for the marker. 20 min cap.
          # First boot of Margine downloads ~2-3 GB of Flatpaks via
          # flatpak-preinstall.service (Zen, Bitwarden, GIMP, ...),
          # plus ostree-finalize-staged, bootc-fix-deploy, machine-id
          # commit, etc. On a non-KVM GHA runner that is slow.
          # Test confirmed network.target reached at ~8 min, multi-user
          # at ~10-12 min — so 10 min was too tight, 20 min is safe.
          MARKER="Reached target multi-user.target"
          for i in $(seq 1 1200); do
            if [[ -f serial.log ]] && grep -q "$MARKER" serial.log; then
              echo "✓ Boot reached multi-user target at second $i"
              echo "passed=true" >> $GITHUB_OUTPUT
              # Try to shut down gracefully via QEMU monitor; otherwise force-kill
              sudo kill "$QEMU_PID" 2>/dev/null || true
              wait "$QEMU_PID" 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done

          echo "✗ Boot did NOT reach multi-user target within 20 minutes"
          echo "Last 200 lines of serial log:"
          tail -200 serial.log
          echo
          echo "=== systemd target progress (Reached vs Failed) ==="
          grep -E "Reached target|Failed to start|systemd\[1\]: Starting" serial.log | tail -40
          echo
          echo "=== units still starting (likely culprits) ==="
          grep -oE "[a-z0-9_-]+\.service" serial.log | sort | uniq -c | sort -rn | head -10
          sudo kill -9 "$QEMU_PID" 2>/dev/null || true
          echo "passed=false" >> $GITHUB_OUTPUT
          exit 1

      - name: Upload serial log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-boot-serial-log
          path: serial.log
          retention-days: 7

      - name: Notify ntfy (boot test outcome)
        if: always() && steps.boot.outcome != 'skipped'
        env:
          NTFY_URL: ${{ secrets.NTFY_TOPIC_URL }}
        run: |
          if [[ -z "${NTFY_URL:-}" ]]; then
            echo "NTFY_TOPIC_URL secret not set, skipping notification."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [[ "${{ steps.boot.outputs.passed }}" == "true" ]]; then
            TITLE="QEMU boot OK → promoting :stable"
            PRIO="default"
            TAGS="rocket,white_check_mark"
            MSG="Candidate is healthy. New :stable available for bootc upgrade."
          else
            TITLE="QEMU boot FAILED — :stable NOT advanced"
            PRIO="high"
            TAGS="x,boom"
            MSG="Boot never reached multi-user.target. Investigate before any bootc upgrade."
          fi
          curl --silent --show-error --fail \
            -H "Title: ${TITLE}" \
            -H "Priority: ${PRIO}" \
            -H "Tags: ${TAGS}" \
            -H "Click: ${RUN_URL}" \
            -d "$MSG" \
            "$NTFY_URL" || echo "ntfy notify failed (non-fatal)"

      # Promotion step: only runs when the boot actually reached
      # multi-user.target (steps.boot.outputs.passed == 'true').
      # Copies the *exact digest* of :candidate (which we just tested)
      # to the public-facing tags :stable, :stable.<date>, :<date>.
      # Using --preserve-digests ensures the bytes on disk are identical
      # to what we booted — no rebuild, no re-rechunk, no surprise.
      - name: Promote candidate → stable (only if boot passed)
        if: success() && steps.boot.outputs.passed == 'true'
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE_TAG="$(date -u +%Y%m%d)"
          SRC_REF="${{ github.event.inputs.image_ref || 'ghcr.io/daniel-g-carrasco/margine:candidate' }}"
          # Strip any explicit candidate.<date> in favor of plain :candidate
          # so we always promote the latest tested candidate, not a stale one.
          REGISTRY_IMAGE="${SRC_REF%:*}"
          echo "$GHCR_TOKEN" | sudo skopeo login --username "$GHCR_USER" --password-stdin ghcr.io
          for promo_tag in stable "stable.${DATE_TAG}" "${DATE_TAG}"; do
            echo "Promoting → ${REGISTRY_IMAGE}:${promo_tag}"
            sudo skopeo copy --retry-times 3 --preserve-digests \
              "docker://${SRC_REF}" \
              "docker://${REGISTRY_IMAGE}:${promo_tag}"
          done
          echo "Candidate digest promoted to :stable, :stable.${DATE_TAG}, :${DATE_TAG}"
