name: Fix WSF sha pin

# Companion to the Renovate custom manager (see .github/renovate.json5).
# Renovate bumps WSF_VERSION in build_files/45-wsf/install.sh from upstream
# GitHub releases, but hosted Renovate cannot hash the release tarball — so
# the sha256 the build verifies would go stale and the build would fail its
# `sha256sum -c`. This recomputes WSF_SHA256 on the Renovate branch right
# after the version bump, so the PR is mergeable as-is.
#
# Runs only on Renovate branches that touch the WSF section. The hash is
# committed back via the GraphQL API (createCommitOnBranch) so the commit is
# VERIFIED / GitHub-signed — main requires signed commits, and a plain
# `git commit` from the runner is unsigned and would block the PR. Like a
# GITHUB_TOKEN push, an API commit does not re-trigger workflows (no loop).

on:
  push:
    branches:
      - "renovate/**"
    paths:
      - "build_files/45-wsf/install.sh"

permissions:
  contents: write

concurrency:
  group: wsf-pin-sha-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fix-sha:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the Renovate branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref_name }}

      - name: Recompute WSF_SHA256 to match WSF_VERSION
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          f=build_files/45-wsf/install.sh
          ver="$(grep -oP '^WSF_VERSION=\K[0-9]+\.[0-9]+\.[0-9]+' "$f")"
          cur="$(grep -oP '^WSF_SHA256=\K[0-9a-f]+' "$f")"
          [ -n "$ver" ] || { echo "::error::could not read WSF_VERSION"; exit 1; }
          # Match the release-RPM URL the build pins (see 45-wsf/install.sh).
          rpm="wayland-scroll-factor-${ver}-1.fc44.x86_64.rpm"
          url="https://github.com/daniel-g-carrasco/wayland-scroll-factor/releases/download/v${ver}/${rpm}"
          echo "Hashing $url"
          new="$(curl -fsSL --retry 3 "$url" | sha256sum | cut -d' ' -f1)"
          [ -n "$new" ] || { echo "::error::failed to hash tarball"; exit 1; }
          if [ "$new" = "$cur" ]; then
            echo "WSF_SHA256 already correct for ${ver} — nothing to do."
            exit 0
          fi
          sed -i "s/^WSF_SHA256=.*/WSF_SHA256=${new}/" "$f"
          # Commit the recomputed hash as a VERIFIED commit via the GraphQL API
          # (github-actions[bot], GitHub-signed) so the Renovate branch passes
          # main's require-signed-commits rule and the PR merges without a bypass.
          gh api graphql -f query='
            mutation ($repo:String!, $branch:String!, $msg:String!, $path:String!, $contents:Base64String!, $oid:GitObjectID!) {
              createCommitOnBranch(input: {
                branch: { repositoryNameWithOwner: $repo, branchName: $branch },
                message: { headline: $msg },
                fileChanges: { additions: [{ path: $path, contents: $contents }] },
                expectedHeadOid: $oid
              }) { commit { oid url } }
            }' \
            -f repo="${GITHUB_REPOSITORY}" \
            -f branch="${GITHUB_REF_NAME}" \
            -f msg="wsf: sync WSF_SHA256 for ${ver}" \
            -f path="$f" \
            -f contents="$(base64 -w0 "$f")" \
            -f oid="$(git rev-parse HEAD)"
          echo "Committed WSF_SHA256 -> ${new} for ${ver} (verified API commit)"
